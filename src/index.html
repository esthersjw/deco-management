<!-- ====== COMMUNICATIONS.JS ====== -->
<script>
// Communications Module
(function() {
  let data = { version: '1.0', updatedAt: new Date().toISOString(), records: [] };
  let currentTab = 'records'; // 'records' | 'todos'
  let editingRecordId = null;
  let kanbanFilterAssignee = 'all';

  // ==================== UTILITIES ====================

  function getUserById(id) {
    return (window.App && App.users ? App.users : []).find(u => u.id === id);
  }

  function getCurrentUser() {
    if (!window.App) return { id: 'user_1', name: '我', avatar: '👩' };
    const users = App.config?.users || App.users || DEFAULT_CONFIG.users;
    const currentId = App.config?.currentUserId || 'user_1';
    return users.find(u => u.id === currentId) || users[0] || { id: 'user_1', name: '我', avatar: '👩' };
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${d.getFullYear()}-${m}-${day}`;
  }

  function todayStr() {
    return formatDate(new Date());
  }

  function isOverdue(todo) {
    if (todo.status === '已完成') return false;
    if (!todo.deadline) return false;
    const deadline = new Date(todo.deadline + 'T23:59:59');
    return deadline < new Date();
  }

  function getTodoStatus(todo) {
    if (todo.status === '已完成') return '已完成';
    if (isOverdue(todo)) return '逾期';
    return '待办';
  }

  function updateTodoStatuses() {
    (data.records || []).forEach(rec => {
      (rec.todos || []).forEach(todo => {
        if (todo.status !== '已完成' && isOverdue(todo)) {
          todo.status = '逾期';
        }
      });
    });
  }

  function generateId(prefix) {
    return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
  }

  function getPhases() {
    const progress = window.App ? App.getData('progress') : null;
    return (progress && progress.phases) ? progress.phases : [];
  }

  function saveData() {
    data.updatedAt = new Date().toISOString();
    if (window.App) App.setData('communications', data);
  }

  // ==================== RENDER: RECORDS LIST ====================

  function renderRecordsList(container) {
    updateTodoStatuses();
    const records = [...(data.records || [])].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    if (records.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <div class="empty-state-text">暂无沟通记录</div>
          <button class="btn btn-primary" onclick="window.commOpenRecordModal()">+ 新增记录</button>
        </div>
      `;
      return;
    }

    container.innerHTML = records.map(rec => {
      const author = getUserById(rec.author);
      const authorName = author ? author.name : '未知';
      const authorAvatar = author ? author.avatar : '👤';
      const todos = rec.todos || [];
      const overdueCount = todos.filter(t => getTodoStatus(t) === '逾期').length;
      const todoText = todos.length > 0
        ? `待办 ${todos.length} 项${overdueCount > 0 ? `（<span style="color:var(--red)">${overdueCount} 逾期</span>）` : '（全部完成）'}`
        : '';

      return `
        <div class="comm-card" data-id="${rec.id}" onclick="window.commOpenRecordModal('${rec.id}')">
          <div class="comm-header">
            <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
              <span style="font-size:0.85rem;color:var(--ink-faint);white-space:nowrap">📅 ${rec.date || '未设定'}</span>
              <span class="comm-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(rec.title || '无标题')}</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:10px">
              <span>${authorAvatar}</span>
              <span style="font-size:0.8rem;color:var(--ink-light)">${authorName}</span>
            </div>
          </div>
          <div class="comm-meta">
            ${rec.participants && rec.participants.length ? '参与：' + escapeHtml(rec.participants.join('、')) : '无参与方'}
            ${rec.location ? ' | 📍 ' + escapeHtml(rec.location) : ''}
          </div>
          ${todoText ? `<div class="comm-todos"><span class="badge ${overdueCount > 0 ? 'badge-red' : 'badge-green'}">${todoText}</span></div>` : ''}
        </div>
      `;
    }).join('');
  }

  // ==================== RENDER: TODO KANBAN ====================

  function renderTodoKanban(container) {
    updateTodoStatuses();
    const allTodos = [];
    (data.records || []).forEach(rec => {
      (rec.todos || []).forEach(todo => {
        allTodos.push({ ...todo, recordId: rec.id, recordTitle: rec.title || '无标题' });
      });
    });

    const filtered = kanbanFilterAssignee === 'all'
      ? allTodos
      : allTodos.filter(t => t.assignee === kanbanFilterAssignee);

    const groups = {
      '逾期': filtered.filter(t => getTodoStatus(t) === '逾期').sort((a, b) => (a.deadline || '').localeCompare(b.deadline || '')),
      '待办': filtered.filter(t => getTodoStatus(t) === '待办').sort((a, b) => (a.deadline || '').localeCompare(b.deadline || '')),
      '已完成': filtered.filter(t => getTodoStatus(t) === '已完成').sort((a, b) => (b.completedAt || '').localeCompare(a.completedAt || ''))
    };

    const users = window.App ? App.users : [{ id: 'user_1', name: '我' }, { id: 'user_2', name: '伴侣' }];

    container.innerHTML = `
      <div class="filter-bar" style="margin-bottom:16px">
        <label style="font-size:0.8rem;color:var(--ink-light)">筛选负责人：</label>
        <select class="app-input app-select" style="width:auto;min-width:140px" onchange="window.commSetKanbanFilter(this.value)">
          <option value="all" ${kanbanFilterAssignee === 'all' ? 'selected' : ''}>全部</option>
          ${users.map(u => `<option value="${u.id}" ${kanbanFilterAssignee === u.id ? 'selected' : ''}>${u.avatar || ''} ${escapeHtml(u.name)}</option>`).join('')}
        </select>
      </div>
      <div class="kanban">
        ${renderKanbanCol('逾期', groups['逾期'], 'var(--red)', '🔴')}
        ${renderKanbanCol('待办', groups['待办'], 'var(--blue)', '⏳')}
        ${renderKanbanCol('已完成', groups['已完成'], 'var(--green)', '✅')}
      </div>
    `;
  }

  function renderKanbanCol(title, items, color, icon) {
    return `
      <div class="kanban-col">
        <div class="kanban-col-header" style="border-bottom-color:${color}">
          <span class="kanban-col-title" style="color:${color}">${icon} ${title}</span>
          <span class="kanban-col-count">${items.length}</span>
        </div>
        ${items.length === 0 ? '<div style="text-align:center;color:var(--ink-faint);font-size:0.8rem;padding:20px 0">暂无事项</div>' : ''}
        ${items.map(item => {
          const assignee = getUserById(item.assignee);
          const assigneeName = assignee ? assignee.name : '未分配';
          const isOverdueItem = title === '逾期';
          const overdueDays = isOverdueItem && item.deadline
            ? Math.ceil((new Date() - new Date(item.deadline + 'T00:00:00')) / (1000 * 60 * 60 * 24))
            : 0;

          return `
            <div class="kanban-item ${isOverdueItem ? 'overdue' : ''}" data-todo-id="${item.id}" data-record-id="${item.recordId}">
              <div style="font-weight:500;font-size:0.85rem;margin-bottom:6px">${escapeHtml(item.content)}</div>
              <div style="font-size:0.75rem;color:var(--ink-faint);display:flex;justify-content:space-between;align-items:center">
                <span>👤 ${escapeHtml(assigneeName)}</span>
                <span>${item.deadline ? '截止:' + item.deadline.substr(5) : ''}</span>
              </div>
              ${isOverdueItem && overdueDays > 0 ? `<div style="font-size:0.75rem;color:var(--red);margin-top:4px">逾期 ${overdueDays} 天</div>` : ''}
              <div style="display:flex;gap:6px;margin-top:8px">
                ${title !== '待办' ? `<button class="btn btn-sm btn-secondary" style="height:26px;padding:0 8px;font-size:0.75rem" onclick="window.commMoveTodo('${item.recordId}','${item.id}','待办');event.stopPropagation();">↩ 待办</button>` : ''}
                ${title !== '已完成' ? `<button class="btn btn-sm btn-primary" style="height:26px;padding:0 8px;font-size:0.75rem" onclick="window.commMoveTodo('${item.recordId}','${item.id}','已完成');event.stopPropagation();">✓ 完成</button>` : ''}
                ${title === '已完成' ? `<button class="btn btn-sm btn-secondary" style="height:26px;padding:0 8px;font-size:0.75rem" onclick="window.commMoveTodo('${item.recordId}','${item.id}','待办');event.stopPropagation();">↩ 撤销</button>` : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  // ==================== MODAL: RECORD EDIT ====================

  function openRecordModal(recordId) {
    editingRecordId = recordId || null;
    const rec = recordId ? (data.records || []).find(r => r.id === recordId) : null;
    const isEdit = !!rec;
    const users = window.App ? App.users : [{ id: 'user_1', name: '我', avatar: '👩' }, { id: 'user_2', name: '伴侣', avatar: '👨' }];
    const phases = getPhases();

    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');
    content.style.maxWidth = '720px';

    content.innerHTML = `
      <div class="modal-header">
        <div class="modal-title">${isEdit ? '✏️ 编辑沟通记录' : '➕ 新增沟通记录'}</div>
        <button class="modal-close" onclick="window.commCloseModal()">×</button>
      </div>
      <div class="modal-body" id="commModalBody">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">日期 *</label>
            <input type="date" class="app-input" id="commDate" value="${rec ? rec.date : todayStr()}">
          </div>
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">作者</label>
            <select class="app-input app-select" id="commAuthor">
              ${users.map(u => `<option value="${u.id}" ${(rec ? rec.author : getCurrentUser().id) === u.id ? 'selected' : ''}>${u.avatar} ${escapeHtml(u.name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">标题 *</label>
          <input type="text" class="app-input" id="commTitle" value="${escapeHtml(rec ? rec.title : '')}" placeholder="例如：水电交底">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">参与方（用顿号分隔）</label>
            <input type="text" class="app-input" id="commParticipants" value="${escapeHtml(rec && rec.participants ? rec.participants.join('、') : '')}" placeholder="例如：项目经理王工、水电工李师傅">
          </div>
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">地点</label>
            <input type="text" class="app-input" id="commLocation" value="${escapeHtml(rec ? rec.location : '')}" placeholder="例如：装修公司门店">
          </div>
        </div>
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">关联阶段</label>
          <select class="app-input app-select" id="commPhase">
            <option value="">-- 无 --</option>
            ${phases.map(p => `<option value="${p.id}" ${(rec ? rec.phaseId : '') === p.id ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('')}
          </select>
        </div>
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">纪要内容</label>
          <textarea class="app-input app-textarea" id="commContent" placeholder="可粘贴飞书会议纪要...">${escapeHtml(rec ? rec.content : '')}</textarea>
        </div>

        <!-- 关键结论 -->
        <div style="margin-bottom:12px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <label style="font-size:0.78rem;color:var(--ink-light)">关键结论</label>
            <button class="btn btn-sm btn-secondary" onclick="window.commAddDecision()" style="height:28px">+ 添加</button>
          </div>
          <div id="commDecisionsList">
            ${(rec ? rec.keyDecisions || [] : []).map((d, i) => renderDecisionRow(i, d)).join('')}
          </div>
        </div>

        <!-- 待办事项 -->
        <div style="margin-bottom:12px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <label style="font-size:0.78rem;color:var(--ink-light)">待办事项</label>
            <button class="btn btn-sm btn-secondary" onclick="window.commAddTodo()" style="height:28px">+ 添加</button>
          </div>
          <div id="commTodosList">
            ${(rec ? rec.todos || [] : []).map((t, i) => renderTodoRow(i, t)).join('')}
          </div>
        </div>

        <!-- 问题/疑虑 -->
        <div style="margin-bottom:12px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <label style="font-size:0.78rem;color:var(--ink-light)">问题 / 疑虑</label>
            <button class="btn btn-sm btn-secondary" onclick="window.commAddConcern()" style="height:28px">+ 添加</button>
          </div>
          <div id="commConcernsList">
            ${(rec ? rec.concerns || [] : []).map((c, i) => renderConcernRow(i, c)).join('')}
          </div>
        </div>
      </div>
      <div class="modal-footer">
        ${isEdit ? `<button class="btn btn-danger" onclick="window.commDeleteRecord()">🗑 删除</button>` : ''}
        <div style="flex:1"></div>
        <button class="btn btn-secondary" onclick="window.commCloseModal()">取消</button>
        <button class="btn btn-primary" onclick="window.commSaveRecord()">保存</button>
      </div>
    `;

    overlay.classList.add('show');
  }

  function renderDecisionRow(index, value) {
    return `
      <div class="flex gap-8" style="margin-bottom:6px;align-items:center" data-decision-index="${index}">
        <input type="text" class="app-input" value="${escapeHtml(value || '')}" placeholder="输入关键结论..." style="flex:1">
        <button class="btn-icon" onclick="window.commRemoveDecision(${index})" title="删除">×</button>
      </div>
    `;
  }

  function renderTodoRow(index, todo) {
    const users = window.App ? App.users : [{ id: 'user_1', name: '我' }, { id: 'user_2', name: '伴侣' }];
    const t = todo || {};
    return `
      <div style="margin-bottom:8px;padding:10px;border:1px solid var(--border-light);border-radius:var(--radius-sm);background:var(--cream)" data-todo-index="${index}">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
          <input type="text" class="app-input" value="${escapeHtml(t.content || '')}" placeholder="待办内容...">
          <select class="app-input app-select">
            ${users.map(u => `<option value="${u.id}" ${t.assignee === u.id ? 'selected' : ''}>${u.avatar || ''} ${escapeHtml(u.name)}</option>`).join('')}
          </select>
          <input type="date" class="app-input" value="${t.deadline || ''}">
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <select class="app-input app-select" style="width:auto;min-width:100px">
            <option value="待办" ${t.status === '待办' ? 'selected' : ''}>待办</option>
            <option value="已完成" ${t.status === '已完成' ? 'selected' : ''}>已完成</option>
            <option value="逾期" ${t.status === '逾期' ? 'selected' : ''}>逾期</option>
          </select>
          <button class="btn btn-sm btn-danger" onclick="window.commRemoveTodo(${index})" style="height:28px;padding:0 10px;font-size:0.75rem">删除</button>
        </div>
      </div>
    `;
  }

  function renderConcernRow(index, value) {
    return `
      <div class="flex gap-8" style="margin-bottom:6px;align-items:center" data-concern-index="${index}">
        <input type="text" class="app-input" value="${escapeHtml(value || '')}" placeholder="输入问题或疑虑..." style="flex:1">
        <button class="btn-icon" onclick="window.commRemoveConcern(${index})" title="删除">×</button>
      </div>
    `;
  }

  // ==================== MODAL ACTIONS ====================

  function addDecision() {
    const list = document.getElementById('commDecisionsList');
    const index = list.querySelectorAll('[data-decision-index]').length;
    const div = document.createElement('div');
    div.innerHTML = renderDecisionRow(index, '');
    list.appendChild(div.firstElementChild);
  }

  function removeDecision(index) {
    const list = document.getElementById('commDecisionsList');
    const rows = Array.from(list.querySelectorAll('[data-decision-index]'));
    if (rows[index]) rows[index].remove();
    // Re-index
    list.querySelectorAll('[data-decision-index]').forEach((el, i) => {
      el.dataset.decisionIndex = i;
      const btn = el.querySelector('button');
      if (btn) btn.setAttribute('onclick', `window.commRemoveDecision(${i})`);
    });
  }

  function addTodo() {
    const list = document.getElementById('commTodosList');
    const index = list.querySelectorAll('[data-todo-index]').length;
    const div = document.createElement('div');
    div.innerHTML = renderTodoRow(index, { assignee: getCurrentUser().id, status: '待办' });
    list.appendChild(div.firstElementChild);
  }

  function removeTodo(index) {
    const list = document.getElementById('commTodosList');
    const rows = Array.from(list.querySelectorAll('[data-todo-index]'));
    if (rows[index]) rows[index].remove();
    list.querySelectorAll('[data-todo-index]').forEach((el, i) => {
      el.dataset.todoIndex = i;
      const btn = el.querySelector('button[onclick^="window.commRemoveTodo"]');
      if (btn) btn.setAttribute('onclick', `window.commRemoveTodo(${i})`);
    });
  }

  function addConcern() {
    const list = document.getElementById('commConcernsList');
    const index = list.querySelectorAll('[data-concern-index]').length;
    const div = document.createElement('div');
    div.innerHTML = renderConcernRow(index, '');
    list.appendChild(div.firstElementChild);
  }

  function removeConcern(index) {
    const list = document.getElementById('commConcernsList');
    const rows = Array.from(list.querySelectorAll('[data-concern-index]'));
    if (rows[index]) rows[index].remove();
    list.querySelectorAll('[data-concern-index]').forEach((el, i) => {
      el.dataset.concernIndex = i;
      const btn = el.querySelector('button');
      if (btn) btn.setAttribute('onclick', `window.commRemoveConcern(${i})`);
    });
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    const content = document.getElementById('modalContent');
    content.style.maxWidth = '';
    editingRecordId = null;
  }

  async function deleteRecord() {
    if (!editingRecordId) return;
    const ok = await (window.App ? App.confirm('确定要删除这条沟通记录吗？') : confirm('确定要删除这条沟通记录吗？'));
    if (!ok) return;
    data.records = (data.records || []).filter(r => r.id !== editingRecordId);
    saveData();
    closeModal();
    render();
    if (window.App) App.showToast('记录已删除', 'success');
  }

  function saveRecord() {
    const date = document.getElementById('commDate').value;
    const author = document.getElementById('commAuthor').value;
    const title = document.getElementById('commTitle').value.trim();
    const participantsStr = document.getElementById('commParticipants').value.trim();
    const location = document.getElementById('commLocation').value.trim();
    const phaseId = document.getElementById('commPhase').value || null;
    const content = document.getElementById('commContent').value.trim();

    if (!date || !title) {
      if (window.App) App.showToast('请填写日期和标题', 'warning');
      return;
    }

    // Collect decisions
    const keyDecisions = [];
    document.querySelectorAll('#commDecisionsList [data-decision-index]').forEach(el => {
      const input = el.querySelector('input');
      if (input && input.value.trim()) keyDecisions.push(input.value.trim());
    });

    // Collect todos
    const todos = [];
    document.querySelectorAll('#commTodosList [data-todo-index]').forEach(el => {
      const inputs = el.querySelectorAll('input, select');
      const todoContent = inputs[0] ? inputs[0].value.trim() : '';
      const todoAssignee = inputs[1] ? inputs[1].value : getCurrentUser().id;
      const todoDeadline = inputs[2] ? inputs[2].value : '';
      const todoStatus = inputs[3] ? inputs[3].value : '待办';
      if (todoContent) {
        const existingId = editingRecordId ? findTodoId(editingRecordId, todoContent, todoAssignee, todoDeadline) : null;
        const todoObj = {
          id: existingId || generateId('todo'),
          content: todoContent,
          assignee: todoAssignee,
          deadline: todoDeadline,
          status: todoStatus,
          completedAt: todoStatus === '已完成' ? (new Date().toISOString()) : null
        };
        // If already completed and has completedAt, preserve it
        if (existingId) {
          const rec = (data.records || []).find(r => r.id === editingRecordId);
          const oldTodo = rec && rec.todos ? rec.todos.find(t => t.id === existingId) : null;
          if (oldTodo && oldTodo.completedAt && todoStatus === '已完成') {
            todoObj.completedAt = oldTodo.completedAt;
          }
        }
        todos.push(todoObj);
      }
    });

    // Collect concerns
    const concerns = [];
    document.querySelectorAll('#commConcernsList [data-concern-index]').forEach(el => {
      const input = el.querySelector('input');
      if (input && input.value.trim()) concerns.push(input.value.trim());
    });

    const participants = participantsStr ? participantsStr.split(/[,，、]/).map(s => s.trim()).filter(Boolean) : [];

    const record = {
      id: editingRecordId || generateId('comm'),
      date,
      author,
      participants,
      location,
      phaseId,
      title,
      content,
      keyDecisions,
      todos,
      concerns,
      createdAt: editingRecordId ? ((data.records || []).find(r => r.id === editingRecordId) || {}).createdAt || new Date().toISOString() : new Date().toISOString()
    };

    if (!data.records) data.records = [];
    if (editingRecordId) {
      const idx = data.records.findIndex(r => r.id === editingRecordId);
      if (idx >= 0) data.records[idx] = record;
      else data.records.push(record);
    } else {
      data.records.push(record);
    }

    saveData();
    closeModal();
    render();
    if (window.App) App.showToast(editingRecordId ? '记录已更新' : '记录已添加', 'success');
  }

  function findTodoId(recordId, content, assignee, deadline) {
    const rec = (data.records || []).find(r => r.id === recordId);
    if (!rec || !rec.todos) return null;
    // Try to match by content + assignee + deadline for existing todos
    const match = rec.todos.find(t => t.content === content && t.assignee === assignee && t.deadline === deadline);
    return match ? match.id : null;
  }

  // ==================== KANBAN ACTIONS ====================

  function setKanbanFilter(value) {
    kanbanFilterAssignee = value;
    render();
  }

  function moveTodo(recordId, todoId, newStatus) {
    const rec = (data.records || []).find(r => r.id === recordId);
    if (!rec || !rec.todos) return;
    const todo = rec.todos.find(t => t.id === todoId);
    if (!todo) return;
    todo.status = newStatus;
    if (newStatus === '已完成') {
      todo.completedAt = new Date().toISOString();
    } else {
      todo.completedAt = null;
    }
    saveData();
    render();
    if (window.App) App.showToast('状态已更新', 'success');
  }

  // ==================== RENDER MAIN ====================

  function render() {
    const container = document.getElementById('communications-content');
    if (!container) return;

    container.innerHTML = `
      <div class="tab-bar">
        <button class="tab ${currentTab === 'records' ? 'active' : ''}" onclick="window.commSwitchTab('records')">全部记录</button>
        <button class="tab ${currentTab === 'todos' ? 'active' : ''}" onclick="window.commSwitchTab('todos')">待办看板</button>
      </div>
      <div id="commTabContent"></div>
    `;

    const tabContent = document.getElementById('commTabContent');
    if (currentTab === 'records') {
      renderRecordsList(tabContent);
    } else {
      renderTodoKanban(tabContent);
    }
  }

  function switchTab(tab) {
    currentTab = tab;
    render();
  }

  // ==================== ESCAPE HTML ====================

  function escapeHtml(text) {
    if (text == null) return '';
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ==================== EXPOSE GLOBALS ====================

  window.commOpenRecordModal = openRecordModal;
  window.commCloseModal = closeModal;
  window.commSaveRecord = saveRecord;
  window.commDeleteRecord = deleteRecord;
  window.commSwitchTab = switchTab;
  window.commAddDecision = addDecision;
  window.commRemoveDecision = removeDecision;
  window.commAddTodo = addTodo;
  window.commRemoveTodo = removeTodo;
  window.commAddConcern = addConcern;
  window.commRemoveConcern = removeConcern;
  window.commSetKanbanFilter = setKanbanFilter;
  window.commMoveTodo = moveTodo;

  // ==================== REGISTER MODULE ====================

  registerModule('communications', {
    name: '沟通',
    init() {
      const btn = document.getElementById('btnAddComm');
      if (btn) btn.addEventListener('click', () => openRecordModal());
    },
    render() {
      render();
    },
    onShow() {
      // Refresh phases data when shown in case progress module updated
      render();
    },
    setData(d) {
      data = d || { version: '1.0', updatedAt: new Date().toISOString(), records: [] };
    }
  });
})();

</script>

<!-- ====== MATERIALS.JS ====== -->
<script>
(function() {
  'use strict';

  let data = { version: '1.0', updatedAt: new Date().toISOString(), items: [], categories: ['瓷砖', '地板', '涂料/油漆', '五金', '灯具', '洁具/卫浴', '门窗', '定制柜', '家电', '家具', '软装', '其他'] };
  let currentFilter = 'all';
  let currentStatusFilter = 'all';
  let searchQuery = '';
  let viewMode = 'card'; // 'card' or 'table'

  const STATUS_LIST = ['待选购', '已下单', '已到货', '已安装', '已验收', '已退货'];
  const STATUS_COLORS = {
    '待选购': 'var(--ink-faint)',
    '已下单': 'var(--blue)',
    '已到货': 'var(--yellow-dark)',
    '已安装': 'var(--green)',
    '已验收': '#16a34a',
    '已退货': 'var(--red)'
  };
  const STATUS_BG = {
    '待选购': 'var(--cream-deep)',
    '已下单': 'rgba(43,127,216,0.08)',
    '已到货': 'rgba(244,215,88,0.15)',
    '已安装': 'rgba(22,163,74,0.08)',
    '已验收': 'rgba(22,163,74,0.12)',
    '已退货': 'rgba(232,74,95,0.08)'
  };

  // ==================== DATA HELPERS ====================

  function getFilteredItems() {
    let items = [...(data.items || [])];
    if (currentFilter !== 'all') {
      items = items.filter(it => it.category === currentFilter);
    }
    if (currentStatusFilter !== 'all') {
      items = items.filter(it => it.status === currentStatusFilter);
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      items = items.filter(it =>
        (it.name || '').toLowerCase().includes(q) ||
        (it.brand || '').toLowerCase().includes(q) ||
        (it.model || '').toLowerCase().includes(q) ||
        (it.supplier || '').toLowerCase().includes(q) ||
        (it.location || '').toLowerCase().includes(q)
      );
    }
    return items.sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
  }

  function getStats() {
    const items = data.items || [];
    const total = items.length;
    const totalAmount = items.reduce((sum, it) => sum + (it.totalPrice || 0), 0);
    const byStatus = {};
    STATUS_LIST.forEach(s => byStatus[s] = 0);
    items.forEach(it => {
      if (byStatus[it.status] !== undefined) byStatus[it.status]++;
    });
    return { total, totalAmount, byStatus };
  }

  function generateId() {
    return 'mat_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
  }

  function formatCurrency(n) {
    if (n === undefined || n === null) return '¥0';
    return '¥' + Number(n).toLocaleString('zh-CN');
  }

  function getPhaseName(phaseId) {
    if (!phaseId) return '';
    const progressData = App.getData('progress') || {};
    const phase = (progressData.phases || []).find(p => p.id === phaseId);
    return phase ? phase.name : '';
  }

  function save() {
    data.updatedAt = new Date().toISOString();
    App.setData('materials', JSON.parse(JSON.stringify(data)));
  }

  // ==================== RENDER: STATS ====================

  function renderStats() {
    const stats = getStats();
    return `
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px">
        <div class="app-card" style="text-align:center;padding:14px">
          <div style="font-size:1.4rem;font-weight:700;color:var(--ink)">${stats.total}</div>
          <div style="font-size:0.75rem;color:var(--ink-faint);margin-top:2px">总项数</div>
        </div>
        <div class="app-card" style="text-align:center;padding:14px">
          <div style="font-size:1.4rem;font-weight:700;color:var(--blue)">${stats.byStatus['待选购'] || 0}</div>
          <div style="font-size:0.75rem;color:var(--ink-faint);margin-top:2px">待选购</div>
        </div>
        <div class="app-card" style="text-align:center;padding:14px">
          <div style="font-size:1.4rem;font-weight:700;color:var(--yellow-dark)">${stats.byStatus['已下单'] || 0}</div>
          <div style="font-size:0.75rem;color:var(--ink-faint);margin-top:2px">已下单</div>
        </div>
        <div class="app-card" style="text-align:center;padding:14px">
          <div style="font-size:1.4rem;font-weight:700;color:var(--green)">${stats.byStatus['已到货'] || 0}</div>
          <div style="font-size:0.75rem;color:var(--ink-faint);margin-top:2px">已到货</div>
        </div>

            <div style="font-size:0.85rem;color:var(--ink-light)">
              ${it.quantity ? `${it.quantity} ${it.unit || '件'}` : ''}
              ${it.unitPrice ? ` × ${formatCurrency(it.unitPrice)}` : ''}

            <div style="font-size:1.1rem;font-weight:700;color:var(--red)">${formatCurrency(it.totalPrice)}</div>

            <div style="display:flex;gap:8px;flex-wrap:wrap">
              ${it.supplier ? `<span>🏪 ${escapeHtml(it.supplier)}</span>` : ''}
              ${it.phaseId ? `<span>🔨 ${escapeHtml(getPhaseName(it.phaseId))}</span>` : ''}
              ${it.location ? `<span>📍 ${escapeHtml(it.location)}</span>` : ''}
            </div>

    </div>`;

  function renderQuickActions(it) {
    const statusIndex = STATUS_LIST.indexOf(it.status);
    const actions = [];
    
    // Previous status
    if (statusIndex > 0 && it.status !== '已退货') {
      actions.push(`<button class="btn btn-icon btn-sm mat-action-prev" data-id="${it.id}" title="回退到${STATUS_LIST[statusIndex - 1]}" style="font-size:0.75rem;padding:2px 6px">◀</button>`);
    }
    
    // Next status
    if (statusIndex < STATUS_LIST.length - 2 && it.status !== '已退货') { // -2 to skip 已退货
      actions.push(`<button class="btn btn-primary btn-sm mat-action-next" data-id="${it.id}" title="推进到${STATUS_LIST[statusIndex + 1]}" style="font-size:0.75rem;padding:2px 8px">${STATUS_LIST[statusIndex + 1]} ▶</button>`);
    }
    
    // Mark as returned
    if (it.status !== '已退货') {
      actions.push(`<button class="btn btn-danger btn-sm mat-action-return" data-id="${it.id}" title="标记退货" style="font-size:0.75rem;padding:2px 8px;margin-left:auto">↩ 退货</button>`);
    }
    
    return actions.join('');
  }

  // ==================== RENDER: MAIN ====================

  function render() {
    const container = document.getElementById('materials-content');
    const items = getFilteredItems();
    
    container.innerHTML = `
      ${renderStats()}
      ${renderFilters()}
      ${viewMode === 'card' ? renderCardView(items) : renderTableView(items)}
    `;
    
    bindEvents();
  }

  function bindEvents() {
    // Filters
    document.getElementById('matCategoryFilter')?.addEventListener('change', (e) => { currentFilter = e.target.value; render(); });
    document.getElementById('matStatusFilter')?.addEventListener('change', (e) => { currentStatusFilter = e.target.value; render(); });
    document.getElementById('matSearch')?.addEventListener('input', (e) => { searchQuery = e.target.value; render(); });
    
    // View mode
    document.getElementById('btnCardView')?.addEventListener('click', () => { viewMode = 'card'; render(); });
    document.getElementById('btnTableView')?.addEventListener('click', () => { viewMode = 'table'; render(); });
    
    // Card click -> detail
    document.querySelectorAll('.mat-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.closest('.mat-action-prev, .mat-action-next, .mat-action-return')) return;
        showDetailModal(card.dataset.id);
      });
    });
    
    // Table row click -> detail
    document.querySelectorAll('.mat-row').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('.mat-action-edit, .mat-action-delete')) return;
        showDetailModal(row.dataset.id);
      });
    });
    
    // Quick actions
    document.querySelectorAll('.mat-action-prev').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); changeStatus(btn.dataset.id, -1); });
    });
    document.querySelectorAll('.mat-action-next').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); changeStatus(btn.dataset.id, 1); });
    });
    document.querySelectorAll('.mat-action-return').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); setStatus(btn.dataset.id, '已退货'); });
    });
    
    // Table actions
    document.querySelectorAll('.mat-action-edit').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); showEditModal(btn.dataset.id); });
    });
    document.querySelectorAll('.mat-action-delete').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); deleteMaterial(btn.dataset.id); });
    });
  }

  // ==================== STATUS CHANGE ====================

  function changeStatus(id, direction) {
    const it = data.items.find(i => i.id === id);
    if (!it) return;
    const idx = STATUS_LIST.indexOf(it.status);
    if (idx < 0) return;
    const newIdx = idx + direction;
    if (newIdx >= 0 && newIdx < STATUS_LIST.length) {
      it.status = STATUS_LIST[newIdx];
      it.updatedAt = new Date().toISOString();
      
      // Auto-set dates
      if (it.status === '已下单' && !it.purchaseDate) it.purchaseDate = new Date().toISOString().slice(0, 10);
      if (it.status === '已到货' && !it.arrivalDate) it.arrivalDate = new Date().toISOString().slice(0, 10);
      if (it.status === '已安装' && !it.installDate) it.installDate = new Date().toISOString().slice(0, 10);
      if (it.status === '已验收' && !it.checkDate) it.checkDate = new Date().toISOString().slice(0, 10);
      
      save();
      render();
      App.showToast(`已更新为「${it.status}」`, 'success');
    }
  }

  function setStatus(id, status) {
    const it = data.items.find(i => i.id === id);
    if (!it) return;
    it.status = status;
    it.updatedAt = new Date().toISOString();
    save();
    render();
    App.showToast(`已标记为「${status}」`, 'success');
  }

  function deleteMaterial(id) {
    if (!confirm('确定要删除这个材料吗？')) return;
    data.items = data.items.filter(i => i.id !== id);
    save();
    render();
    App.showToast('材料已删除', 'success');
  }

  // ==================== ADD TO BUDGET ====================

  function addToBudget(it) {
    const budgetData = App.getData('budget') || { items: [], payments: [] };
    
    // Check if already added
    const existing = (budgetData.items || []).find(bi => bi.materialId === it.id);
    if (existing) {
      App.showToast('该材料已添加到预算', 'warning');
      return;
    }
    
    // Add as budget item
    const budgetItem = {
      id: 'item_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6),
      materialId: it.id,
      name: it.name + (it.brand ? ` (${it.brand})` : ''),
      budget: it.totalPrice || 0,
      actual: it.status === '已下单' || it.status === '已到货' || it.status === '已安装' || it.status === '已验收' ? (it.totalPrice || 0) : 0,
      note: `材料清单导入：${it.category}${it.model ? ' / ' + it.model : ''}${it.spec ? ' / ' + it.spec : ''}`
    };
    
    budgetData.items = budgetData.items || [];
    budgetData.items.push(budgetItem);
    
    // If already purchased, add payment record
    if (it.status === '已下单' || it.status === '已到货' || it.status === '已安装' || it.status === '已验收') {
      const payment = {
        id: 'pay_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6),
        itemId: budgetItem.id,
        date: it.purchaseDate || new Date().toISOString().slice(0, 10),
        amount: it.totalPrice || 0,
        type: '全款',
        payer: App.config?.currentUserId || 'user_1',
        method: '其他',
        receiptDocId: null,
        note: `材料采购：${it.name}`
      };
      budgetData.payments = budgetData.payments || [];
      budgetData.payments.push(payment);
    }
    
    // Recalculate total budget
    budgetData.totalBudget = (budgetData.items || []).reduce((sum, bi) => sum + (bi.budget || 0), 0);
    
    App.setData('budget', JSON.parse(JSON.stringify(budgetData)));
    App.showToast('已添加到预算', 'success');
    closeModal();
  }

          </div>
        </div>
        
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">规格</label>
            <input type="text" class="app-input" id="matSpec" value="${escapeHtml(it?.spec || '')}" placeholder="例如：800x800mm">
          </div>
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">供应商/购买渠道</label>
            <input type="text" class="app-input" id="matSupplier" value="${escapeHtml(it?.supplier || '')}" placeholder="例如：居然之家">
          </div>
        </div>
        
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">数量</label>
            <input type="number" class="app-input" id="matQuantity" value="${it?.quantity || ''}" placeholder="0">
          </div>
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">单位</label>
            <input type="text" class="app-input" id="matUnit" value="${escapeHtml(it?.unit || '件')}" placeholder="件/片/米/套">
          </div>
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">单价 (¥)</label>
            <input type="number" class="app-input" id="matUnitPrice" value="${it?.unitPrice || ''}" placeholder="0">
          </div>
        </div>
        
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">状态</label>
            <select class="app-input app-select" id="matStatus">
              ${STATUS_LIST.map(s => `<option value="${s}" ${(it?.status || '待选购') === s ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
          </div>
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">关联阶段</label>
            <select class="app-input app-select" id="matPhase">
              <option value="">无</option>
              ${phases.map(p => `<option value="${p.id}" ${it?.phaseId === p.id ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('')}
            </select>
          </div>
        </div>
        
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">使用位置</label>
          <input type="text" class="app-input" id="matLocation" value="${escapeHtml(it?.location || '')}" placeholder="例如：客厅、厨房、主卧">
        </div>
        
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:12px">
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">购买日期</label>
            <input type="date" class="app-input" id="matPurchaseDate" value="${it?.purchaseDate || ''}">
          </div>
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">到货日期</label>
            <input type="date" class="app-input" id="matArrivalDate" value="${it?.arrivalDate || ''}">
          </div>
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">安装日期</label>
            <input type="date" class="app-input" id="matInstallDate" value="${it?.installDate || ''}">
          </div>
          <div>
            <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">验收日期</label>
            <input type="date" class="app-input" id="matCheckDate" value="${it?.checkDate || ''}">
          </div>
        </div>
        
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">备注</label>
          <textarea class="app-input app-textarea" id="matNote" rows="3" placeholder="颜色、材质、特殊要求等">${escapeHtml(it?.note || '')}</textarea>
        </div>
        
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:0.78rem;color:var(--ink-light);margin-bottom:4px">照片链接（每行一个URL）</label>
          <textarea class="app-input app-textarea" id="matPhotos" rows="2" placeholder="https://...">${escapeHtml((it?.photos || []).join('\n'))}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="btnMatSave">${isEdit ? '保存' : '添加'}</button>
      </div>
    `;
    overlay.classList.add('show');
    
    document.getElementById('btnMatSave').addEventListener('click', () => {
      const name = document.getElementById('matName').value.trim();
      if (!name) {
        App.showToast('请填写材料名称', 'warning');
        return;
      }
      
      const quantity = Number(document.getElementById('matQuantity').value) || 0;
      const unitPrice = Number(document.getElementById('matUnitPrice').value) || 0;
      const totalPrice = quantity * unitPrice;
      
      const photos = document.getElementById('matPhotos').value.split('\n').map(p => p.trim()).filter(Boolean);
      
      const record = {
        id: isEdit ? it.id : generateId(),
        name,
        category: document.getElementById('matCategory').value,
        brand: document.getElementById('matBrand').value.trim(),
        model: document.getElementById('matModel').value.trim(),
        spec: document.getElementById('matSpec').value.trim(),
        quantity,
        unit: document.getElementById('matUnit').value.trim() || '件',
        unitPrice,
        totalPrice,
        supplier: document.getElementById('matSupplier').value.trim(),
        status: document.getElementById('matStatus').value,
        phaseId: document.getElementById('matPhase').value,
        location: document.getElementById('matLocation').value.trim(),
        purchaseDate: document.getElementById('matPurchaseDate').value,
        arrivalDate: document.getElementById('matArrivalDate').value,
        installDate: document.getElementById('matInstallDate').value,
        checkDate: document.getElementById('matCheckDate').value,
        note: document.getElementById('matNote').value.trim(),
        photos,
        updatedAt: new Date().toISOString()
      };
      
      if (isEdit) {
        const idx = data.items.findIndex(i => i.id === id);
        if (idx >= 0) {
          record.createdAt = data.items[idx].createdAt;
          data.items[idx] = record;
        }
      } else {
        record.createdAt = new Date().toISOString();
        data.items.push(record);
      }
      
      save();
      render();
      closeModal();
      App.showToast(isEdit ? '材料已更新' : '材料已添加', 'success');
    });
  }

  // ==================== REGISTER MODULE ====================

  registerModule('materials', {
    name: '材料',
    init() {
      const btn = document.getElementById('btnAddMaterial');
      if (btn) btn.addEventListener('click', () => showEditModal());
    },
    render() {
      render();
    },
    onShow() {
      render();
    },
    setData(d) {
      data = d || { version: '1.0', updatedAt: new Date().toISOString(), items: [], categories: ['瓷砖', '地板', '涂料/油漆', '五金', '灯具', '洁具/卫浴', '门窗', '定制柜', '家电', '家具', '软装', '其他'] };
    }
  });
})();

</script>

<!-- ====== CONTACTS.JS ====== -->
<script>
// Contacts Module (服务商通讯录)
(function() {
  'use strict';

  // ── Constants ──
  const CONTACT_TYPES = ['设计师', '施工队', '水电工', '瓦工', '木工', '油漆工', '安装工', '监理', '其他'];
  const PHASE_NAMES = ['拆除', '水电', '泥瓦', '木工', '油漆', '安装'];
  const STATUS_LIST = ['合作中', '已完工', '备选', '不推荐'];
  const STATUS_COLORS = {
    '合作中': { bg: '#dbeafe', text: '#1e6bc0', badge: 'blue' },
    '已完工': { bg: '#dcfce7', text: '#16a34a', badge: 'green' },
    '备选': { bg: '#fef3c7', text: '#b45309', badge: 'yellow' },
    '不推荐': { bg: '#fee2e2', text: '#dc2626', badge: 'red' }
  };
  const TYPE_ICONS = {
    '设计师': '🎨', '施工队': '👷', '水电工': '🔌', '瓦工': '🧱',
    '木工': '🪚', '油漆工': '🎨', '安装工': '🔧', '监理': '👁', '其他': '📋'
  };

  // ── State ──
  let data = { version: '1.0', updatedAt: '', contacts: [] };
  let currentView = 'card'; // 'card' | 'table'
  let filters = { type: 'all', status: 'all', phase: 'all', search: '' };

  // ── Helpers ──
  function genId() {
    return 'ct_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
  }

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
  }

  function save() {
    data.updatedAt = new Date().toISOString();
    App.setData('contacts', JSON.parse(JSON.stringify(data)));
  }

  function getFilteredContacts() {
    let list = data.contacts || [];
    if (filters.type !== 'all') {
      list = list.filter(c => c.type === filters.type);
    }
    if (filters.status !== 'all') {
      list = list.filter(c => c.status === filters.status);
    }
    if (filters.phase !== 'all') {
      list = list.filter(c => (c.phases || []).includes(filters.phase));
    }
    if (filters.search) {
      const s = filters.search.toLowerCase();
      list = list.filter(c =>
        (c.name || '').toLowerCase().includes(s) ||
        (c.contactName || '').toLowerCase().includes(s) ||
        (c.phone || '').toLowerCase().includes(s) ||
        (c.wechat || '').toLowerCase().includes(s) ||
        (c.note || '').toLowerCase().includes(s)
      );
    }
    return list;
  }

  function renderStars(rating) {
    let html = '';
    for (let i = 1; i <= 5; i++) {
      html += `<span style="color:${i <= (rating || 0) ? '#F4D758' : '#ddd'};font-size:0.9rem">★</span>`;
    }
    return html;
  }

  // ── Render: Filters ──
  function renderFilters() {
    return `
      <div class="filter-bar">
        <select class="app-input app-select" id="filterContactType" style="min-width:100px">
          <option value="all">全部类型</option>
          ${CONTACT_TYPES.map(t => `<option value="${t}" ${filters.type === t ? 'selected' : ''}>${TYPE_ICONS[t] || '📋'} ${t}</option>`).join('')}
        </select>
        <select class="app-input app-select" id="filterContactStatus" style="min-width:100px">
          <option value="all">全部状态</option>
          ${STATUS_LIST.map(s => `<option value="${s}" ${filters.status === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
        <select class="app-input app-select" id="filterContactPhase" style="min-width:100px">
          <option value="all">全部阶段</option>
          ${PHASE_NAMES.map(p => `<option value="${p}" ${filters.phase === p ? 'selected' : ''}>${p}</option>`).join('')}
        </select>
        <input type="text" class="app-input" id="contactSearch" placeholder="🔍 搜索服务商..." value="${escapeHtml(filters.search)}" style="max-width:200px">
        <div style="flex:1"></div>
        <button class="btn btn-sm ${currentView === 'card' ? 'btn-primary' : 'btn-secondary'}" onclick="MODULES.contacts.setView('card')">⊞ 卡片</button>
        <button class="btn btn-sm ${currentView === 'table' ? 'btn-primary' : 'btn-secondary'}" onclick="MODULES.contacts.setView('table')">☰ 列表</button>
      </div>
    `;
  }

  // ── Render: Card View ──
  function renderCardView(contacts) {
    if (contacts.length === 0) {
      return `<div class="empty-state"><div class="empty-state-icon">📇</div><div class="empty-state-text">暂无服务商</div><div class="text-sm text-faint">点击右上角添加你的装修服务商</div></div>`;
    }
    let html = '<div class="grid-3">';
    contacts.forEach(c => {
      const statusStyle = STATUS_COLORS[c.status] || STATUS_COLORS['备选'];
      const typeIcon = TYPE_ICONS[c.type] || '📋';
      const phasesHtml = (c.phases || []).map(p => `<span class="badge badge-gray" style="font-size:0.7rem">${p}</span>`).join(' ');
      html += `
        <div class="app-card" style="padding:16px;display:flex;flex-direction:column;gap:10px;cursor:pointer" onclick="MODULES.contacts.editContact('${c.id}')">
          <div class="flex-between" style="align-items:flex-start">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:40px;height:40px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:1.3rem">${typeIcon}</div>
              <div>
                <div style="font-weight:600;font-size:1rem">${escapeHtml(c.name)}</div>
                <div class="text-xs text-faint">${escapeHtml(c.type)} · ${escapeHtml(c.contactName || '未填写联系人')}</div>
              </div>
            </div>
            <span class="badge badge-${statusStyle.badge}" style="font-size:0.7rem">${c.status}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;font-size:0.85rem">
            ${c.phone ? `<div>📞 ${escapeHtml(c.phone)}</div>` : ''}
            ${c.wechat ? `<div>💬 微信: ${escapeHtml(c.wechat)}</div>` : ''}
            ${c.email ? `<div>✉️ ${escapeHtml(c.email)}</div>` : ''}
          </div>
          ${phasesHtml ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">${phasesHtml}</div>` : ''}
          <div style="margin-top:auto;padding-top:8px;border-top:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center">
            <div>${renderStars(c.rating)}</div>
            <button class="btn-icon" onclick="event.stopPropagation();MODULES.contacts.deleteContact('${c.id}')" title="删除">🗑</button>
          </div>
        </div>
      `;
    });
    html += '</div>';
    return html;
  }

  // ── Render: Table View ──
  function renderTableView(contacts) {
    if (contacts.length === 0) {
      return `<div class="empty-state"><div class="empty-state-icon">📇</div><div class="empty-state-text">暂无服务商</div></div>`;
    }
    let html = `<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>名称</th><th>类型</th><th>联系人</th><th>电话</th><th>负责阶段</th><th>状态</th><th>评分</th><th style="text-align:center;width:80px">操作</th></tr></thead><tbody>`;
    contacts.forEach(c => {
      const statusStyle = STATUS_COLORS[c.status] || STATUS_COLORS['备选'];
      const phasesHtml = (c.phases || []).map(p => `<span class="badge badge-gray" style="font-size:0.7rem">${p}</span>`).join(' ');
      html += `
        <tr style="cursor:pointer" onclick="MODULES.contacts.editContact('${c.id}')">
          <td><strong>${escapeHtml(c.name)}</strong></td>
          <td>${TYPE_ICONS[c.type] || '📋'} ${escapeHtml(c.type)}</td>
          <td>${escapeHtml(c.contactName || '-')}</td>
          <td>${escapeHtml(c.phone || '-')}</td>
          <td>${phasesHtml || '<span style="color:var(--ink-faint)">-</span>'}</td>
          <td><span class="badge badge-${statusStyle.badge}">${c.status}</span></td>
          <td>${renderStars(c.rating)}</td>
          <td style="text-align:center">
            <button class="btn-icon" onclick="event.stopPropagation();MODULES.contacts.deleteContact('${c.id}')" title="删除">🗑</button>
          </td>
        </tr>
      `;
    });
    html += '</tbody></table></div>';
    return html;
  }

  // ── Render: Current Phase Alert ──
  function renderCurrentPhaseAlert() {
    const progressData = App.getData('progress');
    if (!progressData || !progressData.currentPhaseId) return '';
    const currentPhase = (progressData.phases || []).find(p => p.id === progressData.currentPhaseId);
    if (!currentPhase) return '';
    const phaseContacts = (data.contacts || []).filter(c =>
      c.status === '合作中' && (c.phases || []).includes(currentPhase.name)
    );
    if (phaseContacts.length === 0) return '';
    return `
      <div style="background:var(--blue-light);border:1px solid var(--blue);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
        <span style="font-size:1.2rem">👷</span>
        <div style="flex:1">
          <div style="font-weight:600;color:var(--blue)">当前阶段「${currentPhase.name}」合作中的服务商</div>
          <div style="font-size:0.85rem;color:var(--ink-light);margin-top:2px">
            ${phaseContacts.map(c => `📞 <strong>${escapeHtml(c.name)}</strong> ${c.phone ? '(' + escapeHtml(c.phone) + ')' : ''}`).join(' · ')}
          </div>
        </div>
      </div>
    `;
  }

  // ── Main Render ──
  function render() {
    const container = document.getElementById('contacts-content');
    if (!container) return;
    const contacts = getFilteredContacts();
    let html = renderCurrentPhaseAlert();
    html += renderFilters();
    html += currentView === 'card' ? renderCardView(contacts) : renderTableView(contacts);
    container.innerHTML = html;
    bindFilterEvents();
  }

  function bindFilterEvents() {
    const typeEl = document.getElementById('filterContactType');
    const statusEl = document.getElementById('filterContactStatus');
    const phaseEl = document.getElementById('filterContactPhase');
    const searchEl = document.getElementById('contactSearch');
    if (typeEl) typeEl.addEventListener('change', (e) => { filters.type = e.target.value; render(); });
    if (statusEl) statusEl.addEventListener('change', (e) => { filters.status = e.target.value; render(); });
    if (phaseEl) phaseEl.addEventListener('change', (e) => { filters.phase = e.target.value; render(); });
    if (searchEl) searchEl.addEventListener('input', (e) => { filters.search = e.target.value; render(); });
  }

  // ── Modal: Edit/Add ──
  function showEditModal(contactId) {
    const isEdit = !!contactId;
    const c = isEdit ? (data.contacts || []).find(x => x.id === contactId) : null;
    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');

    content.innerHTML = `
      <div class="modal-header">
        <div class="modal-title">${isEdit ? '✏️ 编辑服务商' : '➕ 新增服务商'}</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" style="display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow-y:auto">
        <div>
          <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">服务商名称 *</label>
          <input type="text" class="app-input" id="contactNameInput" value="${escapeHtml(c?.name || '')}" placeholder="例如：张师傅水电">
        </div>
        <div>
          <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">类型 *</label>
          <select class="app-input app-select" id="contactTypeInput">
            ${CONTACT_TYPES.map(t => `<option value="${t}" ${c?.type === t ? 'selected' : ''}>${TYPE_ICONS[t] || '📋'} ${t}</option>`).join('')}
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">联系人姓名</label>
            <input type="text" class="app-input" id="contactPersonInput" value="${escapeHtml(c?.contactName || '')}" placeholder="联系人">
          </div>
          <div>
            <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">电话</label>
            <input type="tel" class="app-input" id="contactPhoneInput" value="${escapeHtml(c?.phone || '')}" placeholder="手机号码">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">微信</label>
            <input type="text" class="app-input" id="contactWechatInput" value="${escapeHtml(c?.wechat || '')}" placeholder="微信号">
          </div>
          <div>
            <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">邮箱</label>
            <input type="email" class="app-input" id="contactEmailInput" value="${escapeHtml(c?.email || '')}" placeholder="邮箱地址">
          </div>
        </div>
        <div>
          <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">负责阶段（可多选）</label>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${PHASE_NAMES.map(p => `
              <label style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--cream-deep);cursor:pointer;font-size:0.85rem;border:1.5px solid ${(c?.phases || []).includes(p) ? 'var(--blue)' : 'transparent'}">
                <input type="checkbox" value="${p}" ${(c?.phases || []).includes(p) ? 'checked' : ''} class="contactPhaseCb" style="cursor:pointer">
                ${p}
              </label>
            `).join('')}
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">状态</label>
            <select class="app-input app-select" id="contactStatusInput">
              ${STATUS_LIST.map(s => `<option value="${s}" ${c?.status === s ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
          </div>
          <div>
            <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">评分 (1-5)</label>
            <input type="number" class="app-input" id="contactRatingInput" min="1" max="5" value="${c?.rating || 3}" style="width:80px">
          </div>
        </div>
        <div>
          <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">备注</label>
          <textarea class="app-input app-textarea" id="contactNoteInput" rows="3" placeholder="服务评价、报价情况、注意事项等">${escapeHtml(c?.note || '')}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="btnSaveContact">${isEdit ? '保存' : '添加'}</button>
      </div>
    `;
    overlay.classList.add('show');

    document.getElementById('btnSaveContact').addEventListener('click', () => {
      const name = document.getElementById('contactNameInput').value.trim();
      if (!name) {
        App.showToast('请输入服务商名称', 'warning');
        return;
      }
      const type = document.getElementById('contactTypeInput').value;
      const contactName = document.getElementById('contactPersonInput').value.trim();
      const phone = document.getElementById('contactPhoneInput').value.trim();
      const wechat = document.getElementById('contactWechatInput').value.trim();
      const email = document.getElementById('contactEmailInput').value.trim();
      const phases = Array.from(document.querySelectorAll('.contactPhaseCb:checked')).map(cb => cb.value);
      const status = document.getElementById('contactStatusInput').value;
      const rating = parseInt(document.getElementById('contactRatingInput').value, 10) || 0;
      const note = document.getElementById('contactNoteInput').value.trim();

      if (isEdit && c) {
        c.name = name; c.type = type; c.contactName = contactName; c.phone = phone;
        c.wechat = wechat; c.email = email; c.phases = phases; c.status = status;
        c.rating = rating; c.note = note;
        App.showToast('服务商已更新', 'success');
      } else {
        data.contacts = data.contacts || [];
        data.contacts.push({
          id: genId(), name, type, contactName, phone, wechat, email,
          phases, status, rating, note, createdAt: new Date().toISOString()
        });
        App.showToast('服务商已添加', 'success');
      }
      save();
      render();
      closeModal();
    });
  }

  async function deleteContact(contactId) {
    const ok = await App.confirm('确定要删除这个服务商吗？');
    if (!ok) return;
    const idx = (data.contacts || []).findIndex(c => c.id === contactId);
    if (idx === -1) return;
    data.contacts.splice(idx, 1);
    save();
    render();
    App.showToast('服务商已删除', 'success');
  }

  function setView(view) {
    currentView = view;
    render();
  }

  // ── Init ──
  function init() {
    const btn = document.getElementById('btnAddContact');
    if (btn) btn.addEventListener('click', () => showEditModal());
    const initial = App.getData('contacts');
    if (initial) data = initial;
  }

  // ── Register ──
  registerModule('contacts', {
    name: '通讯录',
    init,
    render,
    onShow() {
      const d = App.getData('contacts');
      if (d) data = d;
      render();
    },
    setData(d) {
      data = d || { version: '1.0', updatedAt: new Date().toISOString(), contacts: [] };
    },
    // Exposed for inline onclick handlers
    editContact: showEditModal,
    deleteContact,
    setView
  });
})();

</script>

</body>
</html>
