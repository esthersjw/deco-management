          <div class="empty-state-text">暂不支持在线预览，请下载查看</div>
          <button class="btn btn-primary btn-sm" id="previewDownloadBtn">下载文件</button>
        </div>
      `;
    }

    content.innerHTML = `
      <div class="modal-header">
        <div class="modal-title">${getFileIcon(doc.type)} ${escapeHtml(doc.name)}</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="previewBody" style="padding:0;max-height:75vh;overflow:auto">
        ${previewHtml}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" onclick="closeModal()">关闭</button>
        <button class="btn btn-primary btn-sm" id="previewDownloadBtn2">⬇️ 下载</button>
      </div>
    `;
    overlay.classList.add('show');

    // Bind download buttons
    const bindDownload = (btn) => {
      if (btn && fileUrl) {
        btn.addEventListener('click', () => {
          const a = document.createElement('a');
          a.href = fileUrl;
          a.download = doc.name + '.' + doc.type;
          a.target = '_blank';
          a.click();
        });
      }
    };
    bindDownload(document.getElementById('previewDownloadBtn'));
    bindDownload(document.getElementById('previewDownloadBtn2'));
  }

  // ========== EDIT ==========

  function editDoc(docId) {
    const doc = (data.documents || []).find(d => d.id === docId);
    if (!doc) return;

    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');
    const categories = data.categories || [];
    const currentTags = doc.tags || [];

    content.innerHTML = `
      <div class="modal-header">
        <div class="modal-title">✏️ 编辑文件信息</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">文件名称</label>
          <input type="text" class="app-input" id="editDocName" value="${escapeHtml(doc.name)}">
        </div>
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">分类</label>
          <select class="app-input app-select" id="editDocCategory">
            ${categories.map(c => `<option value="${escapeHtml(c)}" ${doc.category === c ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}
          </select>
        </div>
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">标签</label>
          <div id="editTagContainer" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
            ${currentTags.map(t => `<span class="badge badge-blue edit-tag-item" style="cursor:pointer" data-tag="${escapeHtml(t)}">${escapeHtml(t)} ×</span>`).join('')}
          </div>
          <div style="display:flex;gap:8px">
            <input type="text" class="app-input" id="editTagInput" placeholder="输入标签，回车添加" style="flex:1">
            <button class="btn btn-secondary btn-sm" id="editTagAddBtn">添加</button>
          </div>
          <div id="editTagSuggestions" style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">
            ${getAllTags().filter(t => !currentTags.includes(t)).map(t => `<span class="badge badge-gray edit-tag-suggest" style="cursor:pointer" data-tag="${escapeHtml(t)}">+ ${escapeHtml(t)}</span>`).join('')}
          </div>
        </div>
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">备注</label>
          <textarea class="app-input app-textarea" id="editDocNote" placeholder="添加备注...">${escapeHtml(doc.note || '')}</textarea>
        </div>
        <div style="font-size:0.78rem;color:var(--ink-faint)">
          文件: ${escapeHtml(doc.fileName)} · ${formatSize(doc.size)} · ${formatDateTime(doc.uploadedAt)} · ${getUploaderName(doc.uploadedBy)}
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="editDocSaveBtn">保存</button>
      </div>
    `;
    overlay.classList.add('show');

    let editingTags = currentTags.slice();

    function refreshEditTags() {
      const container = document.getElementById('editTagContainer');
      const suggestions = document.getElementById('editTagSuggestions');
      if (container) {
        container.innerHTML = editingTags.map(t => `<span class="badge badge-blue edit-tag-item" style="cursor:pointer" data-tag="${escapeHtml(t)}">${escapeHtml(t)} ×</span>`).join('');
        container.querySelectorAll('.edit-tag-item').forEach(el => {
          el.addEventListener('click', () => {
            editingTags = editingTags.filter(tag => tag !== el.dataset.tag);
            refreshEditTags();
          });
        });
      }
      if (suggestions) {
        suggestions.innerHTML = getAllTags().filter(t => !editingTags.includes(t)).map(t => `<span class="badge badge-gray edit-tag-suggest" style="cursor:pointer" data-tag="${escapeHtml(t)}">+ ${escapeHtml(t)}</span>`).join('');
        suggestions.querySelectorAll('.edit-tag-suggest').forEach(el => {
          el.addEventListener('click', () => {
            if (!editingTags.includes(el.dataset.tag)) {
              editingTags.push(el.dataset.tag);
              refreshEditTags();
            }
          });
        });
      }
    }

    refreshEditTags();

    const addTag = () => {
      const input = document.getElementById('editTagInput');
      const val = (input.value || '').trim();
      if (val && !editingTags.includes(val)) {
        editingTags.push(val);
        allTags.add(val);
        input.value = '';
        refreshEditTags();
      }
    };

    document.getElementById('editTagAddBtn').addEventListener('click', addTag);
    document.getElementById('editTagInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addTag(); }
    });

    document.getElementById('editDocSaveBtn').addEventListener('click', async () => {
      const newName = document.getElementById('editDocName').value.trim();
      const newCategory = document.getElementById('editDocCategory').value;
      const newNote = document.getElementById('editDocNote').value.trim();

      if (!newName) {
        window.App.showToast('文件名称不能为空', 'warning');
        return;
      }

      doc.name = newName;
      doc.category = newCategory;
      doc.tags = editingTags;
      doc.note = newNote;
      doc.updatedAt = new Date().toISOString();

      data.updatedAt = new Date().toISOString();
      window.App.setData('documents', data);
      updateAllTags();
      closeModal();
      applyFilters();
      render();
      window.App.showToast('文件信息已更新', 'success');
    });
  }

  // ========== DELETE ==========

  async function deleteDoc(docId) {
    const doc = (data.documents || []).find(d => d.id === docId);
    if (!doc) return;

    const confirmed = await window.App.confirm('确定要删除文件 "' + doc.name + '" 吗？此操作不可恢复。');
    if (!confirmed) return;

    data.documents = (data.documents || []).filter(d => d.id !== docId);
    data.updatedAt = new Date().toISOString();
    window.App.setData('documents', data);
    updateAllTags();
    applyFilters();
    render();
    window.App.showToast('文件已删除', 'success');
  }

  // ========== DOWNLOAD ==========

  async function downloadDoc(docId) {
    const doc = (data.documents || []).find(d => d.id === docId);
    if (!doc) return;

    const fileUrl = await getFileUrl(doc.fileName);
    if (!fileUrl) {
      window.App.showToast('文件链接无效', 'error');
      return;
    }

    const a = document.createElement('a');
    a.href = fileUrl;
    a.download = doc.name + '.' + doc.type;
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    window.App.showToast('开始下载: ' + doc.name, 'info');
  }

  // ========== DRAG & DROP ==========

  function setupDragDrop() {
    const container = document.getElementById('documents-content');
    if (!container) return;

    // We need to bind on the module content area
    const moduleEl = document.getElementById('module-documents');
    if (!moduleEl) return;

    moduleEl.addEventListener('dragover', (e) => {
      if (!moduleEl.classList.contains('active')) return;
      e.preventDefault();
      e.stopPropagation();
      moduleEl.style.boxShadow = 'inset 0 0 0 3px var(--blue)';
    });

    moduleEl.addEventListener('dragleave', (e) => {
      e.preventDefault();
      e.stopPropagation();
      moduleEl.style.boxShadow = '';
    });

    moduleEl.addEventListener('drop', (e) => {
      if (!moduleEl.classList.contains('active')) return;
      e.preventDefault();
      e.stopPropagation();
      moduleEl.style.boxShadow = '';
      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        handleFileSelect(e.dataTransfer.files);
      }
    });
  }

  // ========== HTML ESCAPE ==========

  function escapeHtml(text) {
    if (text == null) return '';
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // ========== INIT ==========

  function init() {
    const uploadBtn = document.getElementById('btnUploadDoc');
    if (uploadBtn) uploadBtn.addEventListener('click', handleUploadClick);

    setupDragDrop();

    // Load initial data
    const initial = window.App.getData('documents');
    if (initial) {
      data = initial;
      updateAllTags();
    }
  }

  // ========== REGISTER ==========

  registerModule('documents', {
    name: '文档库',
    init,
    render,
    onShow() { this.render(); },
    setData(d) {
      data = d || data;
      updateAllTags();
    }
  });
})();

</script>

<!-- ====== BUDGET.JS ====== -->
<script>
// Budget Module
(function() {
  let data = { currency: 'CNY', totalBudget: 0, items: [], payments: [] };
  let currentTab = 'overview'; // 'overview' | 'payments' | 'charts'

  const CATEGORIES = ['硬装', '主材', '家具', '家电', '软装', '其他'];
  const PAYMENT_TYPES = ['定金', '首款', '中期', '尾款', '全款'];
  const METHODS = ['转账', '现金', '信用卡', '花呗/白条', '其他'];

  function formatMoney(n) {
    if (n === undefined || n === null || isNaN(n)) return '¥0';
    return '¥' + Number(n).toLocaleString('zh-CN');
  }

  function genId(prefix) {
    return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
  }

  function getItemActual(itemId) {
    return data.payments
      .filter(p => p.itemId === itemId)
      .reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
  }

  function recalcItem(item) {
    item.actual = getItemActual(item.id);
    item.variance = (Number(item.budget) || 0) - item.actual;
    const ratio = item.budget > 0 ? (item.actual - item.budget) / item.budget : 0;
    if (item.actual === 0) item.status = '未开始';
    else if (ratio > 0.10) item.status = '超支';
    else item.status = '正常';
    return item;
  }

  function recalcAll() {
    data.items.forEach(recalcItem);
    data.totalBudget = data.items.reduce((s, it) => s + (Number(it.budget) || 0), 0);
  }

  function getTotalActual() {
    return data.items.reduce((s, it) => s + (Number(it.actual) || 0), 0);
  }

  function getTotalVariance() {
    return data.items.reduce((s, it) => s + (Number(it.variance) || 0), 0);
  }

  function getUsageRate() {
    return data.totalBudget > 0 ? Math.round((getTotalActual() / data.totalBudget) * 100) : 0;
  }

  function getOverBudgetItems() {
    return data.items.filter(it => {
      const ratio = it.budget > 0 ? (it.actual - it.budget) / it.budget : 0;
      return ratio > 0.10;
    });
  }

  function getRowStyle(item) {
    const ratio = item.budget > 0 ? (item.actual - item.budget) / item.budget : 0;
    if (ratio > 0.20) return 'background:rgba(232,74,95,0.06)';
    if (ratio > 0.10) return 'background:rgba(244,215,88,0.12)';
    return '';
  }

  function save() {
    recalcAll();
    App.setData('budget', JSON.parse(JSON.stringify(data)));
  }

  // ========== RENDER: OVERVIEW ==========
  function renderOverview() {
    recalcAll();
    const totalBudget = data.totalBudget;
    const totalActual = getTotalActual();
    const totalVariance = getTotalVariance();
    const usageRate = getUsageRate();
    const overItems = getOverBudgetItems();

    let alerts = '';
    if (totalVariance < 0 && totalBudget > 0 && Math.abs(totalVariance) / totalBudget > 0.05) {
      alerts += `<div class="alert-banner alert-banner-danger">🔴 总预算已超支 ${formatMoney(Math.abs(totalVariance))}（${Math.round(Math.abs(totalVariance)/totalBudget*100)}%），请立即控制支出</div>`;
    }
    overItems.forEach(it => {
      const ratio = Math.round((it.actual - it.budget) / it.budget * 100);
      const cls = ratio > 20 ? 'alert-banner-danger' : 'alert-banner-warning';
      const icon = ratio > 20 ? '🔴' : '⚠️';
      alerts += `<div class="alert-banner ${cls}">${icon} ${escapeHtml(it.name)} 已超支 ${formatMoney(Math.abs(it.variance))}（${ratio}%），建议控制同类预算</div>`;
    });

    let rows = data.items.map((item) => {
      const rowStyle = getRowStyle(item);
      const statusIcon = item.status === '正常' ? '✅' : item.status === '超支' ? '⚠️' : '⏳';
      const statusCls = item.status === '正常' ? 'badge-green' : item.status === '超支' ? 'badge-red' : 'badge-gray';
      return `
        <tr style="${rowStyle}" data-id="${item.id}">
          <td><span class="budget-cell-name" data-field="name">${escapeHtml(item.name)}</span></td>
          <td><span class="budget-cell-category" data-field="category">${escapeHtml(item.category)}</span></td>
          <td style="text-align:right"><span class="budget-cell-budget" data-field="budget">${formatMoney(item.budget)}</span></td>
          <td style="text-align:right"><span class="budget-cell-actual" data-field="actual">${formatMoney(item.actual)}</span></td>
          <td style="text-align:right;${item.variance < 0 ? 'color:var(--red)' : ''}">${formatMoney(item.variance)}</td>
          <td><span class="badge ${statusCls}">${statusIcon} ${item.status}</span></td>
          <td><span class="budget-cell-note" data-field="note">${escapeHtml(item.note || '')}</span></td>
          <td>
            <button class="btn btn-sm btn-danger budget-btn-delete" data-id="${item.id}">🗑</button>
          </td>
        </tr>
      `;
    }).join('');

    if (data.items.length === 0) {
      rows = `<tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon">💰</div><div class="empty-state-text">暂无预算项目，点击右上角「新增项目」开始</div></div></td></tr>`;
    }

    return `
      <div class="budget-overview">
        ${alerts}
        <div class="app-card" style="overflow-x:auto">
          <table class="data-table budget-table">
            <thead>
              <tr>
                <th>项目</th>
                <th>分类</th>
                <th style="text-align:right">预算金额</th>
                <th style="text-align:right">实际金额</th>
                <th style="text-align:right">差额</th>
                <th>状态</th>
                <th>备注</th>
                <th style="width:60px">操作</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
            <tfoot>
              <tr style="font-weight:700;background:rgba(43,127,216,0.04)">
                <td colspan="2">合计</td>
                <td style="text-align:right">${formatMoney(totalBudget)}</td>
                <td style="text-align:right">${formatMoney(totalActual)}</td>
                <td style="text-align:right;${totalVariance < 0 ? 'color:var(--red)' : ''}">${formatMoney(totalVariance)}</td>
                <td colspan="2">
                  <div style="display:flex;align-items:center;gap:8px">
                    <span>使用率</span>
                    <div class="progress-bar" style="flex:1;min-width:80px">
                      <div class="progress-bar-fill ${usageRate > 100 ? 'danger' : usageRate > 80 ? 'warning' : ''}" style="width:${Math.min(usageRate,100)}%"></div>
                    </div>
                    <span>${usageRate}%</span>
                  </div>
                </td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    `;
  }

  // ========== RENDER: PAYMENTS ==========
  function renderPayments() {
    const sorted = [...data.payments].sort((a, b) => new Date(b.date) - new Date(a.date));

    let rows = sorted.map(pay => {
      const item = data.items.find(it => it.id === pay.itemId);
      const itemName = item ? item.name : '（已删除项目）';
      const payer = App.users.find(u => u.id === pay.payer);
      const payerName = payer ? payer.name : pay.payer;
      return `
        <tr data-id="${pay.id}">
          <td>${pay.date}</td>
          <td>${escapeHtml(itemName)}</td>
          <td style="text-align:right;font-weight:600">${formatMoney(pay.amount)}</td>
          <td><span class="badge badge-blue">${escapeHtml(pay.type)}</span></td>
          <td>${escapeHtml(payerName)}</td>
          <td>${escapeHtml(pay.method)}</td>
          <td>${escapeHtml(pay.note || '')}</td>
          <td><button class="btn btn-sm btn-danger budget-btn-delete-pay" data-id="${pay.id}">🗑</button></td>
        </tr>
      `;
    }).join('');

    if (sorted.length === 0) {
      rows = `<tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon">🧾</div><div class="empty-state-text">暂无支出记录，点击下方「新增支出」添加</div></div></td></tr>`;
    }

    return `
      <div class="budget-payments">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div class="text-sm text-faint">共 ${data.payments.length} 笔支出，合计 ${formatMoney(getTotalActual())}</div>
          <button class="btn btn-primary btn-sm" id="btnAddPayment">+ 新增支出</button>
        </div>
        <div class="app-card" style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>日期</th>
                <th>关联项目</th>
                <th style="text-align:right">金额</th>
                <th>付款类型</th>
                <th>付款人</th>
                <th>付款方式</th>
                <th>备注</th>
                <th style="width:60px">操作</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div style="margin-top:20px">
          <div style="font-weight:600;margin-bottom:12px">📅 支出时间线</div>
          <div class="budget-timeline">
            ${renderTimeline(sorted)}
          </div>
        </div>
      </div>
    `;
  }

  function renderTimeline(payments) {
    if (payments.length === 0) return '<div style="color:var(--ink-faint);font-size:0.85rem">暂无支出记录</div>';
    return payments.map((pay) => {
      const item = data.items.find(it => it.id === pay.itemId);
      const itemName = item ? item.name : '（已删除）';
      const payer = App.users.find(u => u.id === pay.payer);
      return `
        <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-light)">
          <div style="flex-shrink:0">
            <div style="width:12px;height:12px;border-radius:50%;background:var(--blue);border:2px solid var(--blue);margin-top:4px"></div>
          </div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-weight:600">${escapeHtml(itemName)} — ${escapeHtml(pay.type)}</span>
              <span style="font-weight:700;color:var(--blue)">${formatMoney(pay.amount)}</span>
            </div>
            <div style="font-size:0.78rem;color:var(--ink-faint)">${pay.date} · ${payer ? escapeHtml(payer.name) : escapeHtml(pay.payer)} · ${escapeHtml(pay.method)}</div>
            ${pay.note ? `<div style="font-size:0.78rem;color:var(--ink-faint);margin-top:4px">${escapeHtml(pay.note)}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // ========== RENDER: CHARTS ==========
  function renderCharts() {
    recalcAll();
    const totalBudget = data.totalBudget;
    const totalActual = getTotalActual();
    const totalVariance = getTotalVariance();

    // Bar chart: budget vs actual per item
    const maxVal = Math.max(...data.items.map(it => Math.max(it.budget || 0, it.actual || 0)), 1);
    const barRows = data.items.map(it => {
      const budgetW = Math.round((it.budget / maxVal) * 100);
      const actualW = Math.round((it.actual / maxVal) * 100);
      const overBudget = it.actual > it.budget;
      return `
        <div style="display:grid;grid-template-columns:100px 1fr 1fr 140px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-light)">
          <div style="font-size:0.85rem;font-weight:500">${escapeHtml(it.name)}</div>
          <div>
            <div style="height:8px;background:var(--border-light);border-radius:4px;overflow:hidden">
              <div style="height:100%;background:var(--blue);border-radius:4px;width:${budgetW}%"></div>
            </div>
          </div>
          <div>
            <div style="height:8px;background:var(--border-light);border-radius:4px;overflow:hidden">
              <div style="height:100%;background:${overBudget ? 'var(--red)' : 'var(--green)'};border-radius:4px;width:${actualW}%"></div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;gap:8px;font-size:0.78rem">
            <span style="color:var(--ink-faint)">${formatMoney(it.budget)}</span>
            <span style="font-weight:600;${overBudget ? 'color:var(--red)' : ''}">${formatMoney(it.actual)}</span>
          </div>
        </div>
      `;
    }).join('');

    // Pie chart by category
    const catMap = {};
    data.items.forEach(it => {
      const c = it.category || '其他';
      if (!catMap[c]) catMap[c] = { budget: 0, actual: 0 };
      catMap[c].budget += Number(it.budget) || 0;
      catMap[c].actual += Number(it.actual) || 0;
    });
    const catEntries = Object.entries(catMap);
    const catColors = ['#2B7FD8', '#F4D758', '#E84A5F', '#16a34a', '#8884d8', '#ff9f43'];
    let gradientParts = [];
    let acc = 0;
    const catTotal = catEntries.reduce((s, [, v]) => s + v.actual, 0) || 1;
    catEntries.forEach(([, v], idx) => {
      const pct = (v.actual / catTotal) * 100;
      const color = catColors[idx % catColors.length];
      gradientParts.push(`${color} ${acc}% ${acc + pct}%`);
      acc += pct;
    });
    const pieStyle = gradientParts.length ? `conic-gradient(${gradientParts.join(', ')})` : 'conic-gradient(var(--border-light) 0% 100%)';

    const catLegend = catEntries.map(([name, v], idx) => {
      const color = catColors[idx % catColors.length];
      const pct = catTotal > 0 ? Math.round((v.actual / catTotal) * 100) : 0;
      return `
        <div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:0.85rem">
          <span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></span>
          <span>${escapeHtml(name)}</span>
          <span style="margin-left:auto;font-weight:600">${formatMoney(v.actual)}</span>
          <span style="color:var(--ink-faint)">(${pct}%)</span>
        </div>
      `;
    }).join('');

    return `
      <div class="budget-charts">
        <div class="grid-2">
          <div class="app-card">
            <div style="font-weight:600;margin-bottom:16px">📊 预算 vs 实际</div>
            <div>
              <div style="display:grid;grid-template-columns:100px 1fr 1fr 140px;gap:8px;align-items:center;padding-bottom:8px;border-bottom:2px solid var(--border-light);font-size:0.78rem;color:var(--ink-faint)">
                <div></div>
                <div>预算</div>
                <div>实际</div>
                <div></div>
              </div>
              ${barRows || '<div class="empty-state"><div class="empty-state-icon">📊</div><div class="empty-state-text">暂无数据</div></div>'}
            </div>
          </div>
          <div class="app-card">
            <div style="font-weight:600;margin-bottom:16px">🥧 分类支出占比</div>
            <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
              <div class="pie-chart" style="background:${pieStyle};flex-shrink:0">
                <div class="pie-center">
                  <div class="pie-value">${formatMoney(totalActual)}</div>
                  <div class="pie-label">总支出</div>
                </div>
              </div>
              <div style="flex:1;min-width:160px">
                ${catLegend || '<div style="color:var(--ink-faint);font-size:0.85rem">暂无数据</div>'}
              </div>
            </div>
          </div>
        </div>
        <div class="app-card" style="margin-top:20px">
          <div style="font-weight:600;margin-bottom:16px">📈 月度支出趋势</div>
          <div>
            ${renderTrendChart()}
          </div>
        </div>
      </div>
    `;
  }

  function renderTrendChart() {
    if (data.payments.length === 0) {
      return '<div class="empty-state"><div class="empty-state-icon">📈</div><div class="empty-state-text">暂无支出数据</div></div>';
    }
    // Group by month
    const monthMap = {};
    [...data.payments].sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(p => {
      const d = new Date(p.date);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!monthMap[key]) monthMap[key] = 0;
      monthMap[key] += Number(p.amount) || 0;
    });
    const entries = Object.entries(monthMap);
    const max = Math.max(...entries.map(([, v]) => v), 1);
    return `
      <div style="display:flex;align-items:flex-end;gap:12px;height:200px;padding-top:20px">
        ${entries.map(([m, v]) => {
          const h = Math.round((v / max) * 100);
          return `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:60px">
              <div style="width:100%;max-width:60px;height:160px;background:var(--border-light);border-radius:4px;position:relative;overflow:hidden">
                <div style="position:absolute;bottom:0;left:0;right:0;height:${h}%;background:var(--blue);border-radius:4px;transition:height 0.5s ease"></div>
              </div>
              <div style="font-size:0.75rem;color:var(--ink-faint)">${m}</div>
              <div style="font-size:0.75rem;font-weight:600">${formatMoney(v)}</div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  // ========== INLINE EDITING ==========
  function makeEditable(container) {
    container.querySelectorAll('.budget-cell-name, .budget-cell-category, .budget-cell-budget, .budget-cell-actual, .budget-cell-note').forEach(cell => {
      cell.addEventListener('click', () => {
        if (cell.querySelector('input, select')) return;
        const field = cell.dataset.field;
        const itemId = cell.closest('tr').dataset.id;
        const item = data.items.find(it => it.id === itemId);
        if (!item) return;

        let input;
        if (field === 'category') {
          input = document.createElement('select');
          input.className = 'app-input app-select';
          input.style.padding = '4px 8px';
          input.style.fontSize = '0.85rem';
          input.style.height = '28px';
          CATEGORIES.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            if (c === item.category) opt.selected = true;
            input.appendChild(opt);
          });
        } else if (field === 'budget' || field === 'actual') {
          input = document.createElement('input');
          input.type = 'number';
          input.className = 'app-input';
          input.style.padding = '4px 8px';
          input.style.fontSize = '0.85rem';
          input.value = item[field] || 0;
        } else {
          input = document.createElement('input');
          input.type = 'text';
          input.className = 'app-input';
          input.style.padding = '4px 8px';
          input.style.fontSize = '0.85rem';
          input.value = item[field] || '';
        }

        cell.innerHTML = '';
        cell.appendChild(input);
        input.focus();

        const commit = () => {
          let val = input.value;
          if (field === 'budget' || field === 'actual') {
            val = Number(val) || 0;
          }
          item[field] = val;
          recalcItem(item);
          save();
          render();
        };

        input.addEventListener('blur', commit);
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') { input.blur(); }
          if (e.key === 'Escape') { render(); }
        });
      });
    });
  }

  // ========== ADD ITEM ==========
  function addItem() {
    const newItem = {
      id: genId('bi'),
      name: '新项目',
      category: CATEGORIES[0],
      budget: 0,
      actual: 0,
      variance: 0,
      status: '未开始',
      paymentSchedule: '',
      note: ''
    };
    data.items.push(newItem);
    save();
    render();
    App.showToast('已新增预算项目', 'success');
  }

  // ========== DELETE ITEM ==========
  async function deleteItem(id) {
    const item = data.items.find(it => it.id === id);
    if (!item) return;
    const ok = await App.confirm(`确定删除「${item.name}」？关联的 ${data.payments.filter(p => p.itemId === id).length} 笔支出记录将保留但不再关联。`);
    if (!ok) return;
    data.items = data.items.filter(it => it.id !== id);
    save();
    render();
    App.showToast('已删除', 'info');
  }

  // ========== ADD PAYMENT ==========
  function addPayment() {
    if (data.items.length === 0) {
      App.showToast('请先添加预算项目', 'warning');
      return;
    }
    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');
    const today = new Date().toISOString().slice(0, 10);
    const itemOptions = data.items.map(it => `<option value="${it.id}">${escapeHtml(it.name)}</option>`).join('');
    const userOptions = App.users.map(u => `<option value="${u.id}" ${u.id === (App.config?.currentUserId || 'user_1') ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('');
    const typeOptions = PAYMENT_TYPES.map(t => `<option value="${t}">${t}</option>`).join('');
    const methodOptions = METHODS.map(m => `<option value="${m}">${m}</option>`).join('');

    content.innerHTML = `
      <div class="modal-header">
        <div class="modal-title">新增支出</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">关联项目</label>
          <select class="app-input app-select" id="payItemId">${itemOptions}</select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div>
            <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">日期</label>
            <input type="date" class="app-input" id="payDate" value="${today}">
          </div>
          <div>
            <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">金额</label>
            <input type="number" class="app-input" id="payAmount" placeholder="0">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div>
            <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">付款类型</label>
            <select class="app-input app-select" id="payType">${typeOptions}</select>
          </div>
          <div>
            <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">付款人</label>
            <select class="app-input app-select" id="payPayer">${userOptions}</select>
          </div>
        </div>
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">付款方式</label>
          <select class="app-input app-select" id="payMethod">${methodOptions}</select>
        </div>
        <div>
          <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">备注</label>
          <input type="text" class="app-input" id="payNote" placeholder="可选">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="btnConfirmAddPay">确认</button>
      </div>
    `;
    overlay.classList.add('show');

    document.getElementById('btnConfirmAddPay').addEventListener('click', () => {
      const itemId = document.getElementById('payItemId').value;
      const date = document.getElementById('payDate').value;
      const amount = Number(document.getElementById('payAmount').value) || 0;
      const type = document.getElementById('payType').value;
      const payer = document.getElementById('payPayer').value;
      const method = document.getElementById('payMethod').value;
      const note = document.getElementById('payNote').value;
      if (!date || amount <= 0) {
        App.showToast('请填写日期和金额', 'warning');
        return;
      }
      data.payments.push({
        id: genId('pay'),
        itemId,
        date,
        amount,
        type,
        payer,
        method,
        receiptDocId: null,
        note
      });
      save();
      closeModal();
      render();
      App.showToast('支出已记录', 'success');
    });
  }

  // ========== DELETE PAYMENT ==========
  async function deletePayment(id) {
    const pay = data.payments.find(p => p.id === id);
    if (!pay) return;
    const ok = await App.confirm(`确定删除这笔 ${formatMoney(pay.amount)} 的支出记录？`);
    if (!ok) return;
    data.payments = data.payments.filter(p => p.id !== id);
    save();
    render();
    App.showToast('已删除', 'info');
  }

  // ========== MAIN RENDER ==========
  function render() {
    const container = document.getElementById('budget-content');
    if (!container) return;

    const tabs = [
      { id: 'overview', label: '预算总表' },
      { id: 'payments', label: '支出明细' },
      { id: 'charts', label: '统计图表' }
    ];

    let content = '';
    if (currentTab === 'overview') content = renderOverview();
    else if (currentTab === 'payments') content = renderPayments();
    else if (currentTab === 'charts') content = renderCharts();

    container.innerHTML = `
      <div class="tab-bar">
        ${tabs.map(t => `<button class="tab ${t.id === currentTab ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>`).join('')}
      </div>
      ${content}
    `;

    // Tab switching
    container.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        currentTab = btn.dataset.tab;
        render();
      });
    });

    // Inline editing (overview only)
    if (currentTab === 'overview') {
      makeEditable(container);
      container.querySelectorAll('.budget-btn-delete').forEach(btn => {
        btn.addEventListener('click', () => deleteItem(btn.dataset.id));
      });
    }

    // Payment actions
    if (currentTab === 'payments') {
      const addBtn = document.getElementById('btnAddPayment');
      if (addBtn) addBtn.addEventListener('click', addPayment);
      container.querySelectorAll('.budget-btn-delete-pay').forEach(btn => {
        btn.addEventListener('click', () => deletePayment(btn.dataset.id));
      });
    }
  }

  function escapeHtml(str) {
    if (str === undefined || str === null) return '';
    return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
  }

  // ========== MODULE REGISTRATION ==========
  registerModule('budget', {
    name: '预算',
    init() {
      const btn = document.getElementById('btnAddBudgetItem');
      if (btn) btn.addEventListener('click', addItem);
    },
    render() {
      render();
    },
    onShow() {
      const d = App.getData('budget');
      if (d) data = JSON.parse(JSON.stringify(d));
      render();
    },
    setData(d) {
      if (d) data = JSON.parse(JSON.stringify(d));
    }
  });
})();

</script>

<!-- ====== PROGRESS.JS ====== -->
<script>
// Progress Module — stage command board
(function() {
  'use strict';

  const PHASE_DEFS = [
    { id: 'phase_design', name: '设计规划', type: 'planning', tasks: ['整理居住需求和预算红线', '确认平面方案', '确认施工图/柜体图', '确认主材预选清单'], checks: ['平面方案确认', '效果图确认', '施工图确认', '主材预算上限确认'] },
    { id: 'phase_demo', name: '拆除', type: 'construction', tasks: ['确认保护范围', '拆除前拍照留底', '确认垃圾清运方式'], checks: ['保护到位', '拆除边界正确', '现场清运完成'] },
    { id: 'phase_water', name: '水电', type: 'construction', tasks: ['确认开关插座点位', '确认厨卫电器尺寸', '水电放样拍照', '保存隐蔽工程照片'], checks: ['水压测试', '电路回路确认', '强弱电间距确认', '隐蔽工程验收'] },
    { id: 'phase_tile', name: '泥瓦', type: 'construction', tasks: ['确认瓷砖到货', '确认铺贴方式', '安排闭水测试'], checks: ['防水验收', '闭水测试', '瓷砖空鼓检查', '坡度检查'] },
    { id: 'phase_wood', name: '木工', type: 'construction', tasks: ['确认吊顶尺寸', '确认柜体复尺', '确认门洞尺寸'], checks: ['基层检查', '收口检查', '柜体尺寸复核'] },
    { id: 'phase_paint', name: '油漆', type: 'construction', tasks: ['确认墙面颜色', '确认腻子/底漆节点', '保护已安装材料'], checks: ['墙面平整度', '阴阳角检查', '色差检查'] },
    { id: 'phase_install', name: '安装', type: 'construction', tasks: ['安排主材安装', '确认五金灯具', '整理缺件清单'], checks: ['灯具通电', '洁具试水', '柜门调平', '全屋收口'] },
    { id: 'phase_soft', name: '软装入住', type: 'movein', tasks: ['家具进场', '开荒保洁', '甲醛检测', '入住物品清单'], checks: ['保洁验收', '家具尺寸确认', '空气检测确认'] }
  ];
  const PHASE_NAMES = PHASE_DEFS.map(p => p.name);
  const STATUS_LIST = ['未开始', '进行中', '已完成', '滞后'];
  const LOCATION_TAGS = ['客厅', '主卧', '次卧', '厨房', '卫生间', '阳台', '书房', '玄关'];
  const NATURE_TAGS = ['正常进度', '发现问题', '验收通过', '待整改', '灵感参考'];
  const MATERIAL_STATUSES = ['待选购', '已下单', '已到货', '已安装', '已验收'];

  let data = { version: '1.1', updatedAt: '', phases: [], currentPhaseId: 'phase_design', photos: [] };
  let currentTab = 'phases';
  let photoFilters = { phase: 'all', location: 'all', nature: 'all', dateFrom: '', dateTo: '', user: 'all' };
  let photoView = 'grid';
  let photoObjectURLs = [];

  function getToday() { return new Date().toISOString().slice(0, 10); }
  function daysBetween(a, b) { if (!a || !b) return 0; return Math.round((new Date(b) - new Date(a)) / 86400000); }
  function money(n) { return '¥' + (Number(n || 0)).toLocaleString('zh-CN'); }
  function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text == null ? '' : String(text); return div.innerHTML; }
  function generateId(prefix) { return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6); }
  function getUser(uId) { return (App.users || []).find(u => u.id === uId) || { name: '未知', avatar: '👤' }; }
  function container() { return document.getElementById('progress-content'); }
  function getPhaseDef(idOrName) { return PHASE_DEFS.find(p => p.id === idOrName || p.name === idOrName) || PHASE_DEFS[0]; }
  function checklistFrom(labels, prefix) { return labels.map((title, idx) => ({ id: `${prefix}_${idx + 1}`, title, done: false })); }
  function normalizePhase(raw, idx) {
    const def = getPhaseDef(raw.id || raw.name);
    return {
      id: def.id,
      name: def.name,
      type: def.type,
      order: idx + 1,
      plannedStart: raw.plannedStart || '', plannedEnd: raw.plannedEnd || '', actualStart: raw.actualStart || '', actualEnd: raw.actualEnd || '',
      status: raw.status || '未开始', progress: Number(raw.progress) || 0, note: raw.note || '',
      tasks: Array.isArray(raw.tasks) && raw.tasks.length ? raw.tasks : checklistFrom(def.tasks, def.id + '_task'),
      checks: Array.isArray(raw.checks) && raw.checks.length ? raw.checks : checklistFrom(def.checks, def.id + '_check'),
      payments: Array.isArray(raw.payments) ? raw.payments : []
    };
  }
  function ensureDefaultPhases() {
    const existing = data.phases || [];
    data.phases = PHASE_DEFS.map((def, idx) => {
      const old = existing.find(p => p.id === def.id || p.name === def.name || (p.order === idx + 1 && p.name !== '设计规划')) || {};
      return normalizePhase({ ...old, id: def.id, name: def.name }, idx);
    });
    if (!data.currentPhaseId || !data.phases.some(p => p.id === data.currentPhaseId)) {
      const active = data.phases.find(p => p.status === '进行中') || data.phases[0];
      data.currentPhaseId = active.id;
    }
    data.version = '1.1';
    data.photos = data.photos || [];
  }
  function save() { data.updatedAt = new Date().toISOString(); App.setData('progress', JSON.parse(JSON.stringify(data))); }
  function isLag(phase) { if (!phase.plannedEnd) return false; const today = getToday(); return (!!phase.actualEnd && phase.actualEnd > phase.plannedEnd) || (!phase.actualEnd && phase.status !== '已完成' && today > phase.plannedEnd); }
  function completion(list) { const arr = list || []; return { done: arr.filter(x => x.done).length, total: arr.length }; }
  function phasePhotos(phase) { return (data.photos || []).filter(p => p.tags?.phase === phase.name); }
  function materialMatchesPhase(m, phase) { return m.phaseId === phase.id || m.phase === phase.name || m.stage === phase.name || (m.note || '').includes(phase.name); }
  function budgetMatchesPhase(item, phase) { return item.phaseId === phase.id || item.phase === phase.name || (item.name || '').includes(phase.name) || (item.note || '').includes(phase.name); }
  function getPhaseSignals(phase) {
    const mat = App.getData('materials') || { items: [] };
    const budget = App.getData('budget') || { items: [], payments: [] };
    const materials = (mat.items || []).filter(m => materialMatchesPhase(m, phase));
    const budgetItems = (budget.items || []).filter(i => budgetMatchesPhase(i, phase));
    const payments = (budget.payments || []).filter(p => {
      const item = (budget.items || []).find(i => i.id === p.itemId);
      return p.phaseId === phase.id || p.phase === phase.name || (item && budgetMatchesPhase(item, phase));
    });
    const planned = budgetItems.reduce((s, i) => s + (Number(i.budget) || 0), 0);
    const actual = payments.reduce((s, p) => s + (Number(p.amount) || 0), 0) || budgetItems.reduce((s, i) => s + (Number(i.actual) || 0), 0);
    return { materials, budgetItems, payments, planned, actual, photos: phasePhotos(phase) };
  }
  function renderTabs() {
    return `<div class="tab-bar"><button class="tab ${currentTab === 'phases' ? 'active' : ''}" data-tab="phases">🧭 阶段节点中心</button><button class="tab ${currentTab === 'photos' ? 'active' : ''}" data-tab="photos">📷 照片墙 (${data.photos?.length || 0})</button></div>`;
  }
  function renderMiniChecklist(phase, key, label) {
    const list = phase[key] || [];
    const c = completion(list);
    return `<div style="background:var(--cream-deep);border-radius:10px;padding:10px"><div class="flex-between" style="margin-bottom:8px"><strong style="font-size:.82rem">${label}</strong><span class="text-xs text-faint">${c.done}/${c.total}</span></div>${list.slice(0,4).map(item => `<label style="display:flex;gap:7px;align-items:flex-start;font-size:.78rem;margin:6px 0;line-height:1.35"><input type="checkbox" ${item.done ? 'checked' : ''} onchange="MODULES.progress.toggleNode('${phase.id}','${key}','${item.id}')"><span style="${item.done ? 'text-decoration:line-through;color:var(--ink-faint)' : ''}">${escapeHtml(item.title)}</span></label>`).join('')}${list.length > 4 ? `<div class="text-xs text-faint">还有 ${list.length - 4} 项，点编辑查看</div>` : ''}</div>`;
  }
  function renderCommandPanel() {
    const phase = data.phases.find(p => p.id === data.currentPhaseId) || data.phases[0];
    if (!phase) return '';
    const signals = getPhaseSignals(phase);
    const task = completion(phase.tasks), check = completion(phase.checks);
    const checkTitle = phase.type === 'planning' ? '确认项' : '验收项';
    const risk = [];
    if (task.done < task.total) risk.push(`${task.total - task.done} 个待办未完成`);
    if (check.done < check.total) risk.push(`${check.total - check.done} 个${checkTitle}未完成`);
    if (signals.materials.filter(m => m.status === '待选购').length) risk.push('还有主材待选购');
    if (signals.planned && signals.actual > signals.planned) risk.push('本阶段预算已超支');
    return `<div class="app-card" style="padding:18px;margin-bottom:18px;border:1px solid rgba(43,127,216,.18);background:linear-gradient(135deg,rgba(43,127,216,.08),rgba(255,255,255,.85))"><div class="flex-between" style="align-items:flex-start;gap:14px"><div><div class="text-xs text-faint" style="margin-bottom:4px">当前作战阶段</div><h2 style="margin:0;font-size:1.35rem">${phase.order}. ${phase.name}</h2><div class="text-sm text-faint" style="margin-top:6px">${phase.type === 'planning' ? '先把方案、图纸、预算红线钉死，别把坑留给施工。' : '现场推进、验收、付款和材料都在这里对齐。'}</div></div><button class="btn btn-sm btn-primary" onclick="MODULES.progress.editPhase('${phase.id}')">编辑当前阶段</button></div><div class="grid-4" style="margin-top:16px"><div class="stat-card"><div class="stat-label">待办</div><div class="stat-value">${task.done}/${task.total}</div></div><div class="stat-card"><div class="stat-label">${checkTitle}</div><div class="stat-value">${check.done}/${check.total}</div></div><div class="stat-card"><div class="stat-label">阶段预算</div><div class="stat-value" style="font-size:1.1rem">${signals.planned ? money(signals.actual) : '未绑定'}</div><div class="stat-sub">${signals.planned ? '预算 ' + money(signals.planned) : '可在预算项备注阶段名'}</div></div><div class="stat-card"><div class="stat-label">材料/照片</div><div class="stat-value">${signals.materials.length}/${signals.photos.length}</div><div class="stat-sub">材料 / 照片</div></div></div>${risk.length ? `<div class="alert-banner alert-banner-warning" style="margin-top:14px">⚠️ ${risk.join(' · ')}</div>` : `<div class="alert-banner alert-banner-success" style="margin-top:14px">✅ 当前阶段没有明显阻塞</div>`}</div>`;
  }
  function renderPhaseCard(phase) {
    const isCurrent = phase.id === data.currentPhaseId;
    const lag = isLag(phase);
    const cls = ['phase-card']; if (isCurrent) cls.push('active'); else if (phase.status === '已完成') cls.push('completed'); else if (lag) cls.push('lag');
    const statusBadge = phase.status === '已完成' ? '<span class="badge badge-green">✅ 已完成</span>' : phase.status === '进行中' ? '<span class="badge badge-blue">🔄 进行中</span>' : lag || phase.status === '滞后' ? '<span class="badge badge-red">⚠️ 滞后</span>' : '<span class="badge badge-gray">⏳ 未开始</span>';
    const signals = getPhaseSignals(phase);
    const task = completion(phase.tasks), check = completion(phase.checks);
    const checkTitle = phase.type === 'planning' ? '确认' : '验收';
    const matSummary = MATERIAL_STATUSES.map(s => { const n = signals.materials.filter(m => m.status === s).length; return n ? `<span class="badge badge-gray">${s} ${n}</span>` : ''; }).join('');
    return `<div class="${cls.join(' ')}" data-phase-id="${phase.id}"><div class="flex-between" style="margin-bottom:10px"><div class="phase-name">${phase.order}. ${phase.name} ${isCurrent ? '<span class="badge badge-blue" style="margin-left:6px">当前</span>' : ''}</div>${statusBadge}</div><div class="phase-dates">计划: ${phase.plannedStart || phase.plannedEnd ? `${phase.plannedStart || '?'} - ${phase.plannedEnd || '进行中'}` : '未设定'}</div><div class="progress-bar" style="margin:10px 0"><div class="progress-bar-fill ${phase.progress >= 100 ? 'success' : lag ? 'danger' : ''}" style="width:${phase.progress}%"></div></div><div class="grid-2" style="gap:10px;margin:10px 0">${renderMiniChecklist(phase, 'tasks', '待办')}${renderMiniChecklist(phase, 'checks', checkTitle + '项')}</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0"><div class="text-xs" style="background:var(--cream-deep);padding:8px;border-radius:8px"><strong>预算</strong><br>${signals.planned ? `${money(signals.actual)} / ${money(signals.planned)}` : '未绑定'}</div><div class="text-xs" style="background:var(--cream-deep);padding:8px;border-radius:8px"><strong>材料</strong><br>${signals.materials.length} 项</div><div class="text-xs" style="background:var(--cream-deep);padding:8px;border-radius:8px"><strong>照片</strong><br>${signals.photos.length} 张</div></div>${matSummary ? `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">${matSummary}</div>` : ''}${phase.note ? `<div class="text-xs" style="color:var(--ink-light);background:var(--cream-deep);padding:7px;border-radius:8px;margin-bottom:10px">${escapeHtml(phase.note)}</div>` : ''}<div class="flex" style="gap:6px;flex-wrap:wrap"><button class="btn btn-sm btn-secondary" onclick="MODULES.progress.editPhase('${phase.id}')">✏️ 编辑</button>${!isCurrent ? `<button class="btn btn-sm btn-primary" onclick="MODULES.progress.setCurrentPhase('${phase.id}')">设为当前</button>` : ''}</div></div>`;
  }
  function renderPhases() { ensureDefaultPhases(); return renderCommandPanel() + `<div class="timeline" style="margin-bottom:20px;flex-wrap:wrap">${data.phases.map((p, i) => `<div class="timeline-item"><div class="timeline-dot ${p.id === data.currentPhaseId ? 'active' : p.status === '已完成' ? 'completed' : isLag(p) ? 'lag' : ''}"></div>${i < data.phases.length - 1 ? `<div class="timeline-line ${p.status === '已完成' ? 'completed' : ''}"></div>` : ''}</div>`).join('')}</div><div class="grid-3" id="phaseGrid">${data.phases.map(renderPhaseCard).join('')}</div>`; }
  function editPhase(phaseId) {
    const phase = data.phases.find(p => p.id === phaseId); if (!phase) return;
    const checkLabel = phase.type === 'planning' ? '确认项' : '验收项';
    const overlay = document.getElementById('modalOverlay'); const content = document.getElementById('modalContent');
    content.innerHTML = `<div class="modal-header"><div class="modal-title">✏️ 编辑阶段 — ${phase.name}</div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body" style="display:flex;flex-direction:column;gap:14px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div><label style="display:block;font-size:.8rem;color:var(--ink-light);margin-bottom:6px">状态</label><select class="app-input app-select" id="editPhaseStatus">${STATUS_LIST.map(s => `<option value="${s}" ${phase.status === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div><div><label style="display:block;font-size:.8rem;color:var(--ink-light);margin-bottom:6px">进度 (%)</label><input type="range" min="0" max="100" value="${phase.progress}" style="width:100%" id="editProgressRange" oninput="document.getElementById('editProgressVal').textContent=this.value+'%'"><div class="text-xs" id="editProgressVal">${phase.progress}%</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div><label style="display:block;font-size:.8rem;color:var(--ink-light);margin-bottom:6px">计划开始</label><input type="date" class="app-input" id="editPlannedStart" value="${phase.plannedStart}"></div><div><label style="display:block;font-size:.8rem;color:var(--ink-light);margin-bottom:6px">计划结束</label><input type="date" class="app-input" id="editPlannedEnd" value="${phase.plannedEnd}"></div></div><div><label style="display:block;font-size:.8rem;color:var(--ink-light);margin-bottom:6px">待办（一行一项，前缀 [x] 表示完成）</label><textarea class="app-input app-textarea" id="editTasks" rows="5">${phase.tasks.map(t => `${t.done ? '[x] ' : ''}${t.title}`).join('\n')}</textarea></div><div><label style="display:block;font-size:.8rem;color:var(--ink-light);margin-bottom:6px">${checkLabel}（一行一项，前缀 [x] 表示完成）</label><textarea class="app-input app-textarea" id="editChecks" rows="5">${phase.checks.map(t => `${t.done ? '[x] ' : ''}${t.title}`).join('\n')}</textarea></div><div><label style="display:block;font-size:.8rem;color:var(--ink-light);margin-bottom:6px">备注</label><textarea class="app-input app-textarea" id="editPhaseNote" rows="3">${escapeHtml(phase.note)}</textarea></div></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" id="btnSavePhase">保存</button></div>`;
    overlay.classList.add('show');
    document.getElementById('btnSavePhase').addEventListener('click', () => {
      phase.status = document.getElementById('editPhaseStatus').value; phase.progress = parseInt(document.getElementById('editProgressRange').value, 10); phase.plannedStart = document.getElementById('editPlannedStart').value; phase.plannedEnd = document.getElementById('editPlannedEnd').value; phase.note = document.getElementById('editPhaseNote').value;
      phase.tasks = parseChecklist(document.getElementById('editTasks').value, phase.id + '_task'); phase.checks = parseChecklist(document.getElementById('editChecks').value, phase.id + '_check');
      if (phase.progress >= 100 && phase.status !== '已完成') phase.status = '已完成'; if (phase.status === '进行中') data.currentPhaseId = phase.id;
      save(); closeModal(); render(); App.showToast('阶段节点已更新', 'success');
    });
  }
  function parseChecklist(text, prefix) { return String(text || '').split('\n').map(x => x.trim()).filter(Boolean).map((line, idx) => { const done = /^\[x\]\s*/i.test(line); return { id: `${prefix}_${idx + 1}`, title: line.replace(/^\[[ x]\]\s*/i, ''), done }; }); }
  function toggleNode(phaseId, key, itemId) { const phase = data.phases.find(p => p.id === phaseId); const item = phase?.[key]?.find(x => x.id === itemId); if (!item) return; item.done = !item.done; save(); render(); }
  function setCurrentPhase(phaseId) { data.currentPhaseId = phaseId; const p = data.phases.find(x => x.id === phaseId); if (p && p.status === '未开始') p.status = '进行中'; save(); render(); App.showToast('已更新当前阶段', 'success'); }

  function renderPhotoFilters() { return `<div class="filter-bar"><select class="app-input app-select" id="filterPhase" onchange="MODULES.progress.setFilter('phase', this.value)"><option value="all">全部阶段</option>${PHASE_NAMES.map(p => `<option value="${p}" ${photoFilters.phase === p ? 'selected' : ''}>${p}</option>`).join('')}</select><select class="app-input app-select" id="filterLocation" onchange="MODULES.progress.setFilter('location', this.value)"><option value="all">全部位置</option>${LOCATION_TAGS.map(l => `<option value="${l}" ${photoFilters.location === l ? 'selected' : ''}>${l}</option>`).join('')}</select><select class="app-input app-select" id="filterNature" onchange="MODULES.progress.setFilter('nature', this.value)"><option value="all">全部性质</option>${NATURE_TAGS.map(n => `<option value="${n}" ${photoFilters.nature === n ? 'selected' : ''}>${n}</option>`).join('')}</select><input type="date" class="app-input" id="filterDateFrom" value="${photoFilters.dateFrom}" onchange="MODULES.progress.setFilter('dateFrom', this.value)"><input type="date" class="app-input" id="filterDateTo" value="${photoFilters.dateTo}" onchange="MODULES.progress.setFilter('dateTo', this.value)"><select class="app-input app-select" id="filterUser" onchange="MODULES.progress.setFilter('user', this.value)"><option value="all">全部拍摄者</option>${(App.users || []).map(u => `<option value="${u.id}" ${photoFilters.user === u.id ? 'selected' : ''}>${u.avatar} ${u.name}</option>`).join('')}</select><div style="flex:1"></div><button class="btn btn-sm ${photoView === 'grid' ? 'btn-primary' : 'btn-secondary'}" onclick="MODULES.progress.setPhotoView('grid')">⊞ 网格</button><button class="btn btn-sm ${photoView === 'timeline' ? 'btn-primary' : 'btn-secondary'}" onclick="MODULES.progress.setPhotoView('timeline')">☰ 时间线</button></div>`; }
  function getFilteredPhotos() { return (data.photos || []).filter(ph => { if (photoFilters.phase !== 'all' && ph.tags?.phase !== photoFilters.phase) return false; if (photoFilters.location !== 'all' && !(ph.tags?.location || []).includes(photoFilters.location)) return false; if (photoFilters.nature !== 'all' && ph.tags?.nature !== photoFilters.nature) return false; if (photoFilters.user !== 'all' && ph.takenBy !== photoFilters.user) return false; if (photoFilters.dateFrom && ph.date < photoFilters.dateFrom) return false; if (photoFilters.dateTo && ph.date > photoFilters.dateTo) return false; return true; }).sort((a, b) => b.date.localeCompare(a.date)); }
  function renderPhotoGrid(photos) { if (!photos.length) return `<div class="empty-state"><div class="empty-state-icon">📷</div><div class="empty-state-text">暂无照片</div><div class="text-sm text-faint">拖拽或点击上传照片</div></div>`; return `<div class="grid-4" id="photoGrid">${photos.map(ph => { const user = getUser(ph.takenBy); const tags = []; if (ph.tags?.phase) tags.push(`<span class="badge badge-blue">${ph.tags.phase}</span>`); if (ph.tags?.nature) tags.push(`<span class="badge badge-${ph.tags.nature === '发现问题' ? 'red' : ph.tags.nature === '验收通过' ? 'green' : 'yellow'}">${ph.tags.nature}</span>`); (ph.tags?.location || []).forEach(loc => tags.push(`<span class="badge badge-gray">${loc}</span>`)); return `<div class="photo-card" data-photo-id="${ph.id}" onclick="MODULES.progress.viewPhoto('${ph.id}')"><div class="photo-card-img"><img src="" data-src="${ph.fileName}" alt="${escapeHtml(ph.note || '照片')}" style="display:none" onload="this.style.display='block';this.nextElementSibling.style.display='none'"><div class="photo-card-placeholder">📷</div></div><div class="photo-card-info"><div class="flex-between" style="margin-bottom:4px"><span class="text-xs text-faint">${ph.date}</span><span class="text-xs text-faint">${user.avatar} ${user.name}</span></div><div class="photo-card-tags">${tags.join('')}</div>${ph.note ? `<div class="text-xs" style="color:var(--ink-light);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(ph.note)}</div>` : ''}</div></div>`; }).join('')}</div>`; }
  function renderPhotoTimeline(photos) { if (!photos.length) return `<div class="empty-state"><div class="empty-state-icon">📷</div><div class="empty-state-text">暂无照片</div></div>`; const groups = {}; photos.forEach(ph => { (groups[ph.date] ||= []).push(ph); }); return `<div style="display:flex;flex-direction:column;gap:20px">${Object.keys(groups).sort().reverse().map(date => `<div class="app-card" style="padding:16px"><div class="text-sm" style="font-weight:600;margin-bottom:12px;color:var(--blue)">${date}</div>${renderPhotoGrid(groups[date])}</div>`).join('')}</div>`; }
  function renderPhotos() { const photos = getFilteredPhotos(); return renderPhotoFilters() + `<div style="margin-bottom:16px"><button class="btn btn-primary btn-sm" onclick="document.getElementById('photoInput').click()">+ 上传照片</button><input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="MODULES.progress.handleFileSelect(this.files)"><span class="text-xs text-faint" style="margin-left:10px">支持拖拽上传</span></div><div id="photoDropZone" style="border:2px dashed var(--border-medium);border-radius:var(--radius);padding:40px;text-align:center;color:var(--ink-faint);margin-bottom:20px;display:none"><div style="font-size:2rem;margin-bottom:8px">📥</div><div>松开鼠标上传照片</div></div>` + (photoView === 'grid' ? renderPhotoGrid(photos) : renderPhotoTimeline(photos)); }
  async function loadPhotoThumbnails() { container().querySelectorAll('img[data-src]').forEach(img => { const url = img.getAttribute('data-src'); if (url && url.startsWith('http')) img.src = url; }); }
  async function savePhotoFile(file, dateFolder) { if (!App.currentProject) { App.showToast('请先登录', 'warning'); return null; } try { const ext = file.name.split('.').pop(); const fileName = 'IMG_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 5) + '.' + ext; const safePath = `projects/${App.currentProject.id}/photos/${dateFolder.replace(/[^a-zA-Z0-9_-]/g, '_')}/${fileName}`; const result = await App.uploadFile('images', safePath, file); if (result.error) throw result.error; return result.url; } catch (e) { console.error('Upload photo failed:', e); App.showToast('保存照片失败: ' + e.message, 'error'); return null; } }
  async function handleFileSelect(files) { if (!files || !files.length) return; const uploaded = []; const currentPhase = data.phases.find(p => p.id === data.currentPhaseId); for (const file of Array.from(files)) { let date = getToday(); const nameMatch = file.name.match(/(20\d{2})(\d{2})(\d{2})/); if (nameMatch) date = `${nameMatch[1]}-${nameMatch[2]}-${nameMatch[3]}`; else if (file.lastModified) date = new Date(file.lastModified).toISOString().slice(0, 10); const path = await savePhotoFile(file, date); if (path) uploaded.push({ id: generateId('ph'), fileName: path, date, takenBy: getCurrentUser().id, tags: { phase: currentPhase?.name || '', location: [], nature: '正常进度' }, note: '' }); } if (uploaded.length) { data.photos.push(...uploaded); save(); render(); App.showToast(`已上传 ${uploaded.length} 张照片`, 'success'); } else App.showToast('没有照片上传成功，请查看权限或文件格式', 'warning'); }
  async function viewPhoto(photoId) { const ph = (data.photos || []).find(p => p.id === photoId); if (!ph) return; const overlay = document.getElementById('modalOverlay'); const content = document.getElementById('modalContent'); content.innerHTML = `<div class="modal-header"><div class="modal-title">📷 照片详情</div><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body" style="display:flex;flex-direction:column;gap:14px"><div style="text-align:center;background:var(--cream-deep);border-radius:var(--radius);overflow:hidden">${ph.fileName ? `<img src="${ph.fileName}" style="max-width:100%;max-height:50vh;object-fit:contain;display:block;margin:0 auto">` : '<div style="padding:40px;color:var(--ink-faint)">无法加载图片</div>'}</div><div><label style="display:block;font-size:.8rem;color:var(--ink-light);margin-bottom:6px">阶段</label><select class="app-input app-select" id="photoPhase"><option value="">未选择</option>${PHASE_NAMES.map(p => `<option value="${p}" ${ph.tags?.phase === p ? 'selected' : ''}>${p}</option>`).join('')}</select></div><div><label style="display:block;font-size:.8rem;color:var(--ink-light);margin-bottom:6px">性质</label><select class="app-input app-select" id="photoNature">${NATURE_TAGS.map(n => `<option value="${n}" ${ph.tags?.nature === n ? 'selected' : ''}>${n}</option>`).join('')}</select></div><div><label style="display:block;font-size:.8rem;color:var(--ink-light);margin-bottom:6px">备注</label><textarea class="app-input app-textarea" id="photoNote" rows="2">${escapeHtml(ph.note || '')}</textarea></div></div><div class="modal-footer"><button class="btn btn-danger" onclick="MODULES.progress.deletePhoto('${ph.id}')">🗑 删除</button><button class="btn btn-secondary" onclick="closeModal()">关闭</button><button class="btn btn-primary" id="btnSavePhoto">保存</button></div>`; overlay.classList.add('show'); document.getElementById('btnSavePhoto').addEventListener('click', () => { ph.tags = ph.tags || {}; ph.tags.phase = document.getElementById('photoPhase').value; ph.tags.nature = document.getElementById('photoNature').value; ph.note = document.getElementById('photoNote').value; save(); closeModal(); render(); App.showToast('照片信息已更新', 'success'); }); }
  async function deletePhoto(photoId) { const ok = await App.confirm('确定要删除这张照片吗？'); if (!ok) return; data.photos = (data.photos || []).filter(p => p.id !== photoId); save(); closeModal(); render(); App.showToast('照片已删除', 'success'); }
  function setFilter(key, value) { photoFilters[key] = value; render(); }
  function setPhotoView(view) { photoView = view; render(); }
  function setupDragDrop() { const zone = container(); if (!zone) return; zone.addEventListener('dragover', e => { if (currentTab !== 'photos') return; e.preventDefault(); const dz = document.getElementById('photoDropZone'); if (dz) dz.style.display = 'block'; }); zone.addEventListener('drop', e => { if (currentTab !== 'photos') return; e.preventDefault(); const dz = document.getElementById('photoDropZone'); if (dz) dz.style.display = 'none'; if (e.dataTransfer.files.length) handleFileSelect(e.dataTransfer.files); }); }
  function render() { const el = container(); if (!el) return; photoObjectURLs.forEach(url => URL.revokeObjectURL(url)); photoObjectURLs = []; ensureDefaultPhases(); el.innerHTML = renderTabs() + (currentTab === 'phases' ? renderPhases() : renderPhotos()); el.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => { currentTab = tab.dataset.tab; render(); })); if (currentTab === 'photos') loadPhotoThumbnails(); }
  const module = { name: '进度', icon: '📅', init() { const el = container(); if (el) el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-text">加载中...</div></div>'; setupDragDrop(); }, render, onShow() { const d = App.getData('progress'); if (d) data = d; ensureDefaultPhases(); render(); }, onHide() { photoObjectURLs.forEach(url => URL.revokeObjectURL(url)); photoObjectURLs = []; }, getData() { return JSON.parse(JSON.stringify(data)); }, setData(d) { if (d) { data = d; ensureDefaultPhases(); } }, isDirty() { return false; }, editPhase, setCurrentPhase, toggleNode, handleFileSelect, viewPhoto, deletePhoto, setFilter, setPhotoView };
