<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>装修指挥官</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="assets/app.css">
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="authOverlay" style="display:flex;position:fixed;inset:0;z-index:5000;background:var(--cream);align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--card-bg);border-radius:var(--radius-lg);padding:clamp(32px,4vw,48px);max-width:420px;width:100%;box-shadow:var(--card-shadow-hover)">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:2.5rem;margin-bottom:12px">🏠</div>
      <h1 style="font-family:'Noto Serif SC',serif;font-size:1.3rem;color:var(--ink);margin-bottom:6px">装修指挥官</h1>
      <p style="font-size:0.85rem;color:var(--ink-faint)">云端协作版</p>
    </div>
    <div id="loginForm">
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">邮箱</label>
        <input type="email" class="app-input" id="loginEmail" placeholder="your@email.com" autocomplete="email">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">密码</label>
        <input type="password" class="app-input" id="loginPassword" placeholder="输入密码" autocomplete="current-password">
      </div>
      <button class="btn btn-primary w-full" id="btnLogin" style="justify-content:center;margin-bottom:12px;width:100%">登录</button>
      <p style="text-align:center;font-size:0.85rem;color:var(--ink-faint)">
        还没有账号？<a href="#" id="showRegister" style="color:var(--blue);text-decoration:none">立即注册</a>
      </p>
    </div>
    <div id="registerForm" style="display:none">
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">邮箱</label>
        <input type="email" class="app-input" id="registerEmail" placeholder="your@email.com" autocomplete="email">
      </div>
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">密码</label>
        <input type="password" class="app-input" id="registerPassword" placeholder="至少8位密码" autocomplete="new-password">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:0.8rem;color:var(--ink-light);margin-bottom:6px">确认密码</label>
        <input type="password" class="app-input" id="registerConfirmPassword" placeholder="再次输入密码" autocomplete="new-password">
      </div>
      <button class="btn btn-primary w-full" id="btnRegister" style="justify-content:center;margin-bottom:12px;width:100%">注册</button>
      <p style="text-align:center;font-size:0.85rem;color:var(--ink-faint)">
        已有账号？<a href="#" id="showLogin" style="color:var(--blue);text-decoration:none">立即登录</a>
      </p>
    </div>
    <div id="authError" style="display:none;margin-top:12px;padding:10px 14px;border-radius:var(--radius-sm);background:rgba(232,74,95,0.08);color:var(--red);font-size:0.85rem;text-align:center"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- MODAL OVERLAY -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- APP CONTAINER -->
<div class="app-container">

  <!-- TOP BAR -->
  <header class="app-header">
    <div class="app-header-left">
      <div class="app-logo" id="appLogo">
        <span class="app-logo-icon">🏠</span>
        <span>装修指挥官</span>
        <span class="app-project-name" id="projectNameDisplay">— 我们的家</span>
      </div>
    </div>
    <div class="app-header-right">
      <div class="save-status saved" id="saveStatus">
        <span id="saveIcon">🟢</span>
        <span id="saveText">已保存</span>
      </div>
      <div class="user-switcher" id="userSwitcher" style="display:none">
        <button class="user-switcher-btn" id="userSwitcherBtn">
          <span class="user-avatar" id="currentUserAvatar">👤</span>
          <span id="currentUserName">用户</span>
          <span>▾</span>
        </button>
        <div class="user-dropdown" id="userDropdown">
          <div class="user-option" id="userSignOutOption">
            <span>🚪</span>
            <span>退出登录</span>
          </div>
        </div>
      </div>
      <button class="btn-icon" id="settingsBtn" title="设置">🔧</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="app-sidebar" id="appSidebar">
    <div class="nav-item active" data-module="dashboard" id="nav-dashboard">
      <span class="nav-icon">📊</span>
      <span class="nav-label">总览</span>
    </div>
    <div class="nav-item" data-module="documents" id="nav-documents">
      <span class="nav-icon">📁</span>
      <span class="nav-label">文档库</span>
    </div>
    <div class="nav-item" data-module="budget" id="nav-budget">
      <span class="nav-icon">💰</span>
      <span class="nav-label">预算</span>
    </div>
    <div class="nav-item" data-module="progress" id="nav-progress">
      <span class="nav-icon">📅</span>
      <span class="nav-label">进度</span>
    </div>
    <div class="nav-item" data-module="materials" id="nav-materials">
      <span class="nav-icon">🧱</span>
      <span class="nav-label">材料</span>
    </div>
    <div class="nav-item" data-module="contacts" id="nav-contacts">
      <span class="nav-icon">📇</span>
      <span class="nav-label">通讯录</span>
    </div>
    <div class="nav-item" data-module="communications" id="nav-communications">
      <span class="nav-icon">💬</span>
      <span class="nav-label">沟通</span>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="app-main" id="appMain">

    <!-- DASHBOARD MODULE -->
    <div class="module-content active" id="module-dashboard">
      <div class="module-header">
        <div class="module-title"><span class="module-icon">📊</span>总览</div>
        <div style="display:flex;gap:8px">
          <a href="board.html" class="btn btn-secondary btn-sm" style="text-decoration:none" target="_blank">🎨 情绪板</a>
          <button class="btn btn-primary btn-sm" id="btnGenerateReport">📄 生成本周周报</button>
        </div>
      </div>
      <div id="dashboard-content"></div>
    </div>

    <!-- DOCUMENTS MODULE -->
    <div class="module-content" id="module-documents">
      <div class="module-header">
        <div class="module-title"><span class="module-icon">📁</span>文档库</div>
        <button class="btn btn-primary btn-sm" id="btnUploadDoc">+ 上传文件</button>
      </div>
      <div id="documents-content"></div>
    </div>

    <!-- BUDGET MODULE -->
    <div class="module-content" id="module-budget">
      <div class="module-header">
        <div class="module-title"><span class="module-icon">💰</span>预算</div>
        <button class="btn btn-primary btn-sm" id="btnAddBudgetItem">+ 新增项目</button>
      </div>
      <div id="budget-content"></div>
    </div>

    <!-- PROGRESS MODULE -->
    <div class="module-content" id="module-progress">
      <div class="module-header">
        <div class="module-title"><span class="module-icon">📅</span>进度</div>
      </div>
      <div id="progress-content"></div>
    </div>

    <!-- MATERIALS MODULE -->
    <div class="module-content" id="module-materials">
      <div class="module-header">
        <div class="module-title"><span class="module-icon">🧱</span>材料清单</div>
        <button class="btn btn-primary btn-sm" id="btnAddMaterial">+ 新增材料</button>
      </div>
      <div id="materials-content"></div>
    </div>

    <!-- COMMUNICATIONS MODULE -->
    <div class="module-content" id="module-communications">
      <div class="module-header">
        <div class="module-title"><span class="module-icon">💬</span>沟通</div>
        <button class="btn btn-primary btn-sm" id="btnAddComm">+ 新增记录</button>
      </div>
      <div id="communications-content"></div>
    </div>

    <!-- CONTACTS MODULE -->
    <div class="module-content" id="module-contacts">
      <div class="module-header">
        <div class="module-title"><span class="module-icon">📇</span>服务商通讯录</div>
        <button class="btn btn-primary btn-sm" id="btnAddContact">+ 新增服务商</button>
      </div>
      <div id="contacts-content"></div>
    </div>

  </main>

  <!-- MOBILE NAV -->
  <nav class="mobile-nav" id="mobileNav">
    <div class="mobile-nav-item active" data-module="dashboard">
      <span class="nav-icon">📊</span>
      <span>总览</span>
    </div>
    <div class="mobile-nav-item" data-module="documents">
      <span class="nav-icon">📁</span>
      <span>文档</span>
    </div>
    <div class="mobile-nav-item" data-module="budget">
      <span class="nav-icon">💰</span>
      <span>预算</span>
    </div>
    <div class="mobile-nav-item" data-module="progress">
      <span class="nav-icon">📅</span>
      <span>进度</span>
    </div>
    <div class="mobile-nav-item" data-module="materials">
      <span class="nav-icon">🧱</span>
      <span>材料</span>
    </div>
    <div class="mobile-nav-item" data-module="contacts">
      <span class="nav-icon">📇</span>
      <span>通讯录</span>
    </div>
    <div class="mobile-nav-item" data-module="communications">
      <span class="nav-icon">💬</span>
      <span>沟通</span>
    </div>
  </nav>

</div>

<script src="js/app-core.js"></script>


<!-- ====== DASHBOARD.JS ====== -->
<script src="js/dashboard.js"></script>

<!-- ====== DOCUMENTS.JS ====== -->
<script src="js/documents.js"></script>

<!-- ====== BUDGET.JS ====== -->
<script src="js/budget.js"></script>

<!-- ====== PROGRESS.JS ====== -->
<script src="js/progress.js"></script>

<!-- ====== COMMUNICATIONS.JS ====== -->
<script src="js/communications.js"></script>

<!-- ====== MATERIALS.JS ====== -->
<script src="js/materials.js"></script>

<!-- ====== CONTACTS.JS ====== -->
<script src="js/contacts.js"></script>

</body>
</html>
